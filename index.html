<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS FORUM — Launch</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --g1: #fff0a0;
            --g2: #f5c842;
            --g3: #BF953F;
            --g4: #8B6914;
            --deep: #1a0305;
            --text-muted: rgba(253,245,230,0.55);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        /* ══ BACKGROUND LAYERS ══════════════════════════════════ */
        body {
            background: #1a0305;
            font-family: 'Cormorant Garamond', serif;
        }
        .bg-img {
            position: fixed; inset: 0; z-index: 0;
            background: url('45383.png') center center / cover no-repeat;
            transform: scale(1.04);
            animation: bgDrift 20s ease-in-out infinite alternate;
        }
        @keyframes bgDrift {
            from { transform: scale(1.04) translate(0,0); }
            to   { transform: scale(1.08) translate(-1%,-0.5%); }
        }
        .bg-dark {
            position: fixed; inset: 0; z-index: 1;
            background:
                radial-gradient(ellipse 70% 70% at 50% 45%, rgba(40,4,10,0.65) 0%, rgba(15,2,5,0.96) 100%);
        }
        .bg-glow-center {
            position: fixed; z-index: 2;
            width: 700px; height: 700px;
            top: 50%; left: 50%;
            transform: translate(-50%, -55%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(191,149,63,0.12) 0%, transparent 70%);
            animation: centerGlow 4s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes centerGlow {
            from { opacity: 0.6; transform: translate(-50%,-55%) scale(1); }
            to   { opacity: 1;   transform: translate(-50%,-55%) scale(1.15); }
        }

        /* ══ CANVAS PARTICLES ═══════════════════════════════════ */
        #canvas { position: fixed; inset: 0; z-index: 3; pointer-events: none; }

        /* ══ BORDER FRAME ════════════════════════════════════════ */
        .frame {
            position: fixed; inset: 16px; z-index: 4;
            pointer-events: none;
            border: 1px solid rgba(191,149,63,0.18);
            border-radius: 4px;
        }
        .frame::before {
            content: '';
            position: absolute; inset: 4px;
            border: 1px solid rgba(191,149,63,0.08);
            border-radius: 3px;
        }
        /* Corner accents */
        .corner {
            position: absolute; width: 22px; height: 22px;
        }
        .corner svg { width: 22px; height: 22px; }
        .corner.tl { top: -1px;  left: -1px; }
        .corner.tr { top: -1px;  right: -1px; transform: scaleX(-1); }
        .corner.bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
        .corner.br { bottom: -1px; right: -1px; transform: scale(-1,-1); }

        /* ══ MAIN STAGE ══════════════════════════════════════════ */
        .stage {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 24px 40px;
            gap: 0;
            text-align: center;
        }

        /* ══ LOGO AREA ═══════════════════════════════════════════ */
        .logo-area {
            position: relative;
            margin-bottom: 32px;
            opacity: 0; animation: aScale 1.2s cubic-bezier(.16,1,.3,1) 0.2s forwards;
        }
        /* Outer spinning ring */
        .ring-spin {
            position: absolute;
            inset: -28px;
            border-radius: 50%;
            border: 1px solid rgba(191,149,63,0.25);
            animation: spin 18s linear infinite;
        }
        .ring-spin::before {
            content: '';
            position: absolute;
            top: -2px; left: 50%;
            width: 5px; height: 5px;
            background: var(--g2);
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 8px var(--g2), 0 0 16px var(--g2);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Second ring counter */
        .ring-counter {
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            border: 1px dashed rgba(191,149,63,0.15);
            animation: spin 12s linear infinite reverse;
        }

        /* Glow behind logo */
        .logo-halo {
            position: absolute;
            inset: -40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(191,149,63,0.22) 0%, rgba(191,149,63,0.06) 50%, transparent 70%);
            animation: haloPulse 3s ease-in-out infinite;
        }
        @keyframes haloPulse {
            0%,100% { opacity: 0.7; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.1); }
        }

        .logo-img {
            width: 118px; height: 118px;
            object-fit: contain;
            position: relative; z-index: 2;
            filter: drop-shadow(0 4px 20px rgba(191,149,63,0.5))
                    drop-shadow(0 0 40px rgba(191,149,63,0.25));
            animation: logoFloat 5s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
        }

        /* ══ TITLE ═══════════════════════════════════════════════ */
        .title-wrap {
            text-align: center;
            opacity: 0; animation: aUp 1s ease 0.45s forwards;
            margin-bottom: 6px;
        }
        .eyebrow {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.58rem, 1.4vw, 0.7rem);
            letter-spacing: 0.42em;
            text-transform: uppercase;
            color: var(--g3);
            display: block;
            margin-bottom: 10px;
        }
        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-weight: 900;
            font-size: clamp(2.1rem, 7vw, 5rem);
            line-height: 1;
            letter-spacing: 0.04em;
            background: linear-gradient(
                180deg,
                var(--g1) 0%,
                var(--g2) 25%,
                var(--g3) 50%,
                var(--g2) 72%,
                var(--g4) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(245,200,66,0.35));
        }

        /* ══ ORNAMENT DIVIDER ════════════════════════════════════ */
        .ornament-row {
            display: flex; align-items: center; gap: 8px;
            margin: 18px 0;
            opacity: 0; animation: aUp 0.9s ease 0.65s forwards;
        }
        .orn-line {
            height: 1px; width: 100px;
            background: linear-gradient(to right, transparent, var(--g3), transparent);
        }
        .orn-center {
            display: flex; align-items: center; gap: 6px;
        }
        .orn-gem { width: 4px; height: 4px; background: var(--g2); transform: rotate(45deg); }
        .orn-gem.big { width: 7px; height: 7px; box-shadow: 0 0 10px var(--g2); }

        /* ══ SUBTITLE ════════════════════════════════════════════ */
        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-align: center;
            margin-bottom: 36px;
            opacity: 0; animation: aUp 0.9s ease 0.8s forwards;
            line-height: 1.5;
        }
        .subtitle strong {
            color: rgba(253,245,230,0.8);
            font-style: normal;
            font-weight: 400;
        }

        /* ══ LAUNCH BUTTON ═══════════════════════════════════════ */
        .btn-wrap {
            opacity: 0; animation: aUp 1s ease 1.0s forwards;
        }
        .btn-launch {
            position: relative;
            display: inline-flex; align-items: center; gap: 16px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: clamp(0.78rem, 1.8vw, 0.9rem);
            font-weight: 700;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #1a0800;
            padding: 20px 60px;
            border-radius: 60px;
            background: linear-gradient(135deg,
                #fff4b0 0%, #f5c842 30%, #BF953F 60%, #e8b84b 80%, #fff0a0 100%);
            box-shadow:
                0 0 0 1px rgba(245,200,66,0.4),
                0 8px 40px rgba(191,149,63,0.45),
                0 2px 0 rgba(255,255,255,0.2) inset,
                0 -1px 0 rgba(0,0,0,0.2) inset;
            transition: transform 0.35s cubic-bezier(.16,1,.3,1),
                        box-shadow 0.35s ease,
                        filter 0.3s ease;
            overflow: hidden;
        }
        /* Shimmer */
        .btn-launch::before {
            content: '';
            position: absolute; top: 0; left: -120%;
            width: 50%; height: 100%;
            background: linear-gradient(110deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s ease;
        }
        .btn-launch:hover::before { left: 170%; }
        .btn-launch:hover {
            transform: translateY(-5px) scale(1.04);
            box-shadow:
                0 0 0 1px rgba(255,240,160,0.7),
                0 20px 60px rgba(191,149,63,0.6),
                0 2px 0 rgba(255,255,255,0.25) inset;
            filter: brightness(1.1);
        }
        .btn-launch:active { transform: translateY(-1px) scale(1.01); }
        .btn-arrow {
            display: inline-flex;
            transition: transform 0.35s cubic-bezier(.16,1,.3,1);
        }
        .btn-launch:hover .btn-arrow { transform: translateX(6px); }

        /* Outer glow ring on button */
        .btn-launch::after {
            content: '';
            position: absolute; inset: -4px;
            border-radius: 70px;
            border: 1px solid rgba(245,200,66,0.2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .btn-launch:hover::after { opacity: 1; }

        /* ══ KEYFRAMES ═══════════════════════════════════════════ */
        @keyframes aUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes aScale {
            from { opacity: 0; transform: scale(0.75); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* ══ MOBILE ══════════════════════════════════════════════ */
        @media (max-width: 600px) {
            .frame { inset: 10px; }
            .logo-img { width: 90px; height: 90px; }
            .ring-spin { inset: -20px; }
            .ring-counter { inset: -12px; }
            .logo-halo { inset: -28px; }
            .btn-launch { padding: 17px 44px; }
            .orn-line { width: 60px; }
            .subtitle { font-size: 0.95rem; }
            .top-tag { margin-bottom: 22px; }
            .logo-area { margin-bottom: 24px; }
        }
        @media (max-width: 380px) {
            .logo-img { width: 76px; height: 76px; }
            .main-title { font-size: 1.85rem; }
            .btn-launch { padding: 15px 34px; letter-spacing: 0.18em; }
        }
    </style>
</head>
<body>

<div class="bg-img"></div>
<div class="bg-dark"></div>
<div class="bg-glow-center"></div>
<canvas id="canvas"></canvas>

<!-- Decorative border frame -->
<div class="frame">
    <div class="corner tl">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 21 L1 5 Q1 1 5 1 L21 1" stroke="rgba(191,149,63,0.6)" stroke-width="1.2"/>
            <circle cx="1" cy="1" r="2" fill="rgba(191,149,63,0.5)"/>
        </svg>
    </div>
    <div class="corner tr">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 21 L1 5 Q1 1 5 1 L21 1" stroke="rgba(191,149,63,0.6)" stroke-width="1.2"/>
            <circle cx="1" cy="1" r="2" fill="rgba(191,149,63,0.5)"/>
        </svg>
    </div>
    <div class="corner bl">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 21 L1 5 Q1 1 5 1 L21 1" stroke="rgba(191,149,63,0.6)" stroke-width="1.2"/>
            <circle cx="1" cy="1" r="2" fill="rgba(191,149,63,0.5)"/>
        </svg>
    </div>
    <div class="corner br">
        <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 21 L1 5 Q1 1 5 1 L21 1" stroke="rgba(191,149,63,0.6)" stroke-width="1.2"/>
            <circle cx="1" cy="1" r="2" fill="rgba(191,149,63,0.5)"/>
        </svg>
    </div>
</div>

<div class="stage">

    <div class="logo-area">
        <div class="ring-spin"></div>
        <div class="ring-counter"></div>
        <div class="logo-halo"></div>
        <img class="logo-img" src="44967.png" alt="SFGC Logo">
    </div>

    <div class="title-wrap">
        <span class="eyebrow">Indian Knowledge System Forum</span>
        <h1 class="main-title">SFGC IKS FORUM</h1>
    </div>

    <div class="ornament-row">
        <div class="orn-line"></div>
        <div class="orn-center">
            <div class="orn-gem"></div>
            <div class="orn-gem big"></div>
            <div class="orn-gem"></div>
        </div>
        <div class="orn-line"></div>
    </div>

    <p class="subtitle">
        <strong>Bridging Tradition &amp; Innovation</strong><br>
        Seshadripuram Research Foundation · SRF India
    </p>

    <div class="btn-wrap">
        <a href="home.html" class="btn-launch">
            Launch Now
            <span class="btn-arrow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </span>
        </a>
    </div>

</div>



<script>
/* ── PARTICLE SYSTEM ──────────────────────────────────── */
const cv  = document.getElementById('canvas');
const ctx = cv.getContext('2d');
let W, H;
const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
resize(); window.addEventListener('resize', resize);

class P {
    constructor(init) {
        this.r = () => Math.random();
        this.reset(init);
    }
    reset(init) {
        this.x    = this.r() * W;
        this.y    = init ? this.r() * H : H + 5;
        this.sz   = this.r() * 2.2 + 0.4;
        this.vy   = this.r() * 0.55 + 0.18;
        this.vx   = (this.r() - 0.5) * 0.2;
        this.life = 0;
        this.max  = this.r() * 320 + 180;
        this.hue  = 36 + this.r() * 18;
        this.sat  = 75 + this.r() * 20;
    }
    tick() {
        this.y -= this.vy; this.x += this.vx; this.life++;
        if (this.y < -8 || this.life > this.max) this.reset(false);
    }
    draw() {
        const t = this.life / this.max;
        const a = t < 0.12 ? t/0.12 : t > 0.78 ? (1-t)/0.22 : 1;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.sz, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${this.hue},${this.sat}%,72%,${a*0.5})`;
        ctx.fill();
    }
}

const ps = Array.from({length: 70}, (_, i) => new P(true));

/* Occasional star burst */
function burst(x, y) {
    for (let i = 0; i < 6; i++) {
        const p = new P(false);
        p.x = x; p.y = y;
        p.vy = Math.random() * 1.2 + 0.3;
        p.vx = (Math.random()-0.5) * 1.5;
        ps.push(p);
    }
    if (ps.length > 120) ps.splice(70, ps.length - 120);
}
setInterval(() => burst(Math.random()*W, Math.random()*H*0.6), 2200);

(function loop() {
    ctx.clearRect(0,0,W,H);
    ps.forEach(p => { p.tick(); p.draw(); });
    requestAnimationFrame(loop);
})();
</script>
</body>
</html>
