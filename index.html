<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS FORUM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #4A0D0D;
            background-image: url('launch_bg.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            font-family: 'Georgia Pro', Georgia, serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ENTERING SCREEN - Now set to display flex by default */
        .entering-screen {
            display: flex; 
            text-align: center;
            z-index: 20;
            background: radial-gradient(circle, #4A0D0D 0%, #2D0809 100%);
            position: fixed;
            inset: 0;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 25px solid #2D0809;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        }

        .ornate-divider {
            color: #AA771C;
            font-size: 2rem;
            opacity: 0.2;
            margin: 20px 0;
            letter-spacing: 10px;
        }

        .entering-text {
            font-family: 'Georgia Pro', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(to bottom, #BF953F 22%, #FCF6BA 45%, #B38728 50%, #FBF5B7 55%, #AA771C 78%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(191, 149, 63, 0.4));
            text-transform: uppercase;
        }

        .progress-wrapper {
            width: 600px;
            max-width: 85vw;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(170, 119, 28, 0.2);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #BF953F, #FCF6BA, #AA771C);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            transition: width 0.1s linear;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .progress-text, .progress-percent {
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #AA771C;
            font-weight: bold;
        }

        .status-text {
            color: rgba(170, 119, 28, 0.5);
            font-size: 0.8rem;
            margin-top: 30px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .entering-text { font-size: 1.8rem; letter-spacing: 6px; }
            .progress-wrapper { width: 80%; }
            .progress-container { height: 8px; }
        }

        @media (max-width: 480px) {
            .entering-text { font-size: 1.4rem; letter-spacing: 4px; }
            .progress-wrapper { width: 85%; }
            .progress-container { height: 6px; }
        }
    </style>
</head>
<body>

<div class="entering-screen" id="entering-screen">
    <div class="entering-text">Entering The Forum</div>
    <div class="ornate-divider">❧ ~~~~~~~~~~ ☙</div>
    <div class="progress-wrapper">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-info">
            <span class="progress-text">Loading</span>
            <span class="progress-percent" id="progress-percent">0%</span>
        </div>
    </div>
    <div class="status-text" id="status-text">Please wait...</div>
</div>

<script>
    // Configuration
    const redirectPage = 'home.html';

    // Start loading automatically when the window loads
    window.onload = function() {
        startProgressBar(redirectPage);
    };

    function startProgressBar(redirectTo) {
        let width = 0;
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const statusText = document.getElementById('status-text');
        
        const statusMessages = ['Please wait...', 'Loading resources', 'Almost ready', 'Launching website'];
        
        const progressInterval = setInterval(() => {
            width += 1;
            progressBar.style.width = width + '%';
            progressPercent.textContent = width + '%';
            
            if (width >= 25 && width < 50) statusText.textContent = statusMessages[1];
            else if (width >= 50 && width < 85) statusText.textContent = statusMessages[2];
            else if (width >= 85) statusText.textContent = statusMessages[3];
            
            if (width >= 100) {
                clearInterval(progressInterval);
                setTimeout(() => { 
                    window.location.href = redirectTo; 
                }, 800);
            }
        }, 40); // Slightly faster interval (40ms) for a smoother feel
    }
</script>
</body>
</html>
