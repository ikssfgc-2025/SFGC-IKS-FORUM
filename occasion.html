<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>SFGC IKS FORUM - Occasions</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            overflow-x: hidden; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            font-size: 11pt; line-height: 1.2;
        }
        body {
            font-family: 'Georgia Pro', Georgia, serif;
            background: url('45383.png') no-repeat top center fixed;
            background-color: #1a0a00;
            background-size: cover;
            color: #ffffff;
            display: flex; flex-direction: column;
        }

        /* ============================================
           UNIFORM HEADER & NAV
           ============================================ */
        header {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 16px 20px 14px;
            text-align: center;
            position: relative;
            z-index: 1000;
        }
        .header-logo-wrap {
            display: flex; align-items: center;
            justify-content: center; gap: 14px;
            margin-bottom: 10px;
        }
        .header-logo-wrap img {
            width: 54px; height: 54px;
            object-fit: contain; display: block; border-radius: 6px;
        }
        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            margin: 0; font-size: 1.6em; letter-spacing: 1px;
        }
        nav { margin-top: 10px; }
        nav ul {
            list-style: none; padding: 0; margin: 0;
            display: flex; justify-content: center;
            flex-wrap: wrap; gap: 20px;
        }
        nav ul li { margin: 0; }
        nav a {
            color: #ffcc66; text-decoration: none;
            font-weight: bold; position: relative;
            font-size: 1.1em;
            font-family: 'Georgia Pro', Georgia, serif;
            display: inline-block; padding-bottom: 2px;
        }
        nav a::after {
            content: ''; position: absolute;
            width: 0; height: 2px; bottom: -4px; left: 0;
            background-color: #ffd700; transition: width 0.3s ease;
        }
        nav a:hover::after { width: 100%; }
        nav a:hover { color: #fff; text-shadow: 0 0 10px #ffd700; }
        nav a.active { color: #fff; }
        nav a.active::after { width: 100%; }
        .hamburger {
            display: none; flex-direction: column; cursor: pointer;
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%); z-index: 1001; padding: 4px;
        }
        .hamburger div {
            width: 25px; height: 3px; background-color: #cccccc;
            margin: 4px 0; border-radius: 2px; transition: background-color 0.2s;
        }
        .hamburger:hover div { background-color: #ffd700; }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        main {
            flex: 1; max-width: 900px; width: 90%;
            margin: 40px auto; padding: 40px 20px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.8), 0 0 20px rgba(255,215,0,0.2);
            text-align: center;
        }
        h2.main-title {
            font-size: 1.8em; color: #ffd700;
            border-bottom: 1px solid #ffcc66;
            display: inline-block; margin-bottom: 35px; width: 80%;
        }
        .event-section {
            margin-bottom: 30px; padding: 25px;
            border-left: 5px solid #BF953F;
            text-align: left; background: rgba(0,0,0,0.3);
            border-radius: 0 15px 15px 0;
        }
        .event-title {
            color: #ffd700; font-size: 1.2em;
            margin: 0 0 15px 0; font-weight: bold;
        }
        .event-btn {
            color: #ffd700; font-weight: bold; text-decoration: none;
            border: 1px solid #ffd700; padding: 10px 20px;
            border-radius: 5px; display: inline-block;
            transition: all 0.3s ease; margin-right: 15px; margin-top: 10px;
            background: transparent; font-family: 'Georgia Pro', Georgia, serif;
            font-size: 0.95em;
        }
        .event-btn:hover { background: #ffd700; color: #000; }
        .calendar-container {
            margin-top: 20px; border-radius: 12px; overflow: hidden;
            border: 1px solid #BF953F; background: #fff;
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            padding: 30px 20px; text-align: center;
            background: linear-gradient(to right, #1F0505, #3B0D0D, #1F0505);
            border-top: 2px solid #BF953F; margin-top: auto;
        }
        footer p {
            margin: 0; font-weight: bold; font-size: 1em; line-height: 1.6;
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* ============================================
           MOBILE
           ============================================ */
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            nav ul {
                display: none; flex-direction: column;
                position: absolute; top: 100%; right: 10px;
                width: 260px; background-color: rgba(0,0,0,0.97);
                padding: 20px 0; border: 1px solid #BF953F;
                border-radius: 12px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.9);
                z-index: 2000;
            }
            nav ul.active { display: flex; }
            nav ul li {
                margin: 0; width: 100%; text-align: center;
                padding: 10px 0;
                border-bottom: 1px solid rgba(191,149,63,0.15);
            }
            nav ul li:last-child { border-bottom: none; }
            nav a {
                font-size: 1.1em;
                font-family: 'Georgia Pro', Georgia, serif;
                font-weight: bold; color: #ffcc66;
                display: inline-block; padding: 0 10px;
            }
            nav a::after { display: none; }
            nav a:hover, nav a.active { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
            h1 { font-size: 1.3em; }
            .header-logo-wrap img { width: 42px; height: 42px; }
            main { width: 92%; padding: 20px 15px; margin: 20px auto; }
            .event-btn { margin-right: 8px; padding: 8px 14px; }
        }
    </style>
</head>
<body>

<header>
    <div class="hamburger" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
    <div class="header-logo-wrap">
        <img src="44967.png" alt="SFGC Logo">
        <h1>SFGC IKS FORUM</h1>
    </div>
    <nav>
        <ul id="nav-menu">
            <li><a href="home.html">Home</a></li>
            <li><a href="occasion.html" class="active">Occasions</a></li>
            <li><a href="proceedings-journal.html">Proceedings &amp; Journal</a></li>
            <li><a href="committee.html">Committee</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html" class="active">Reach Out</a></li>
        </ul>
    </nav>
</header>

<main>
    <h2 class="main-title">Event Curriculum</h2>

    <div class="event-section">
        <p class="event-title">IKS 2026</p>
        <a href="https://drive.google.com/file/d/1TL5xug1Jgy4n2mnmJuXZfuGJwqIck21a/view" target="_blank" class="event-btn">PROSPECTUS</a>
        <a href="#" id="dynamic-register-btn" target="_blank" class="event-btn">REGISTER NOW</a>
    </div>

    <div class="event-section">
        <p class="event-title">IKS HORIZONS 2025</p>
        <a href="https://drive.google.com/file/d/1TL5xug1Jgy4n2mnmJuXZfuGJwqIck21a/view" target="_blank" class="event-btn">PROSPECTUS</a>
        <a href="https://drive.google.com/drive/folders/1KHlqlGkWQ3xXBlPGiWZRhTSzLBiTzaB0" target="_blank" class="event-btn">VIEW GALLERY</a>
    </div>

    <div class="event-section">
        <p class="event-title">UPCOMING EVENTS CALENDAR</p>
        <div class="calendar-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=iks.sfgc%40gmail.com&ctz=Asia%2FKolkata&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0"
                    style="border:0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>
</main>

<footer>
    <p>© All Copyrights Reserved 2026-27<br>SFGC IKS FORUM - SRF INDIA</p>
</footer>

<script>
    function toggleMenu() {
        document.getElementById('nav-menu').classList.toggle('active');
    }
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('nav-menu');
        const hamburger = document.querySelector('.hamburger');
        if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
            menu.classList.remove('active');
        }
    });

    // Dynamic register link from GitHub
    const GITHUB_USER = "ikssfgc-2025";
    const REPO_NAME   = "SFGC-IKS-FORUM";
    const FILE_NAME   = "link.txt";

    async function syncLink() {
        const btn = document.getElementById('dynamic-register-btn');
        const fetchUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${FILE_NAME}?v=${new Date().getTime()}`;
        try {
            const response = await fetch(fetchUrl);
            if (response.ok) {
                const latestLink = (await response.text()).trim();
                if (latestLink.startsWith("http")) {
                    btn.href = latestLink;
                } else {
                    btn.onclick = (e) => { e.preventDefault(); alert("Registration is not open yet. Please check back soon."); };
                }
            }
        } catch (err) {
            console.error("Link fetch failed:", err);
        }
    }
    window.onload = syncLink;
</script>
</body>
</html>
