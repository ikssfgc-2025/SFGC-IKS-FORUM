<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS Forum - Events</title>
    <style>
        /* [Keeping your beautiful design exactly the same] */
        body { 
            font-family: 'Georgia Pro', Georgia, serif;
            background: url('45383.png') no-repeat top center fixed;
            background-size: cover;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { background-color: rgba(0, 0, 0, 0.6); padding: 20px; text-align: center; }
        h1 { color: #ffd700; }
        
        nav ul { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; }
        nav a { color: #ffcc66; text-decoration: none; font-weight: bold; }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 40px 20px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            text-align: center;
            flex: 1;
        }

        .event-section {
            margin-bottom: 30px;
            padding: 25px;
            border-left: 5px solid #BF953F;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
        }

        .event-btn {
            color: #ffd700;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid #ffd700;
            padding: 8px 15px;
            border-radius: 5px;
            display: inline-block;
            margin-right: 15px;
            margin-top: 10px;
        }
        
        .event-btn:hover { background: #ffd700; color: #000; }

        footer { padding: 20px; text-align: center; background: #1F0505; color: #BF953F; border-top: 2px solid #BF953F; }
    </style>
</head>
<body>

    <header>
        <h1>SFGC IKS Forum</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="occasion.html">Occasions</a></li>
                <li><a href="about us.html">About Us</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h2 style="color: #ffd700;">Event Curriculum</h2>
        
        <div class="event-section">
            <p><strong>IKS 2026</strong></p>
            <a href="https://drive.google.com/file/d/1TL5xug1Jgy4n2mnmJuXZfuGJwqIck21a/view" target="_blank" class="event-btn">PROSPECTUS</a>
            
            <a href="#" id="dynamic-register-btn" target="_blank" class="event-btn">REGISTER NOW</a>
        </div>
    </main>

    <footer>
        <p>© All Copyrights Reserved 2026-27 | SFGC IKS FORUM</p>
    </footer>

    <script>
        // --- TEACHER: CHANGE THESE 3 LINES ONLY ---
        const GITHUB_USERNAME = "ikssfgc-2025"; 
        const REPOSITORY_NAME = "SFGC-IKS-FORUM";
        const FILENAME = "link.txt"; 

        async function loadRegistrationLink() {
            const btn = document.getElementById('dynamic-register-btn');
            
            // This grabs the "Sticky Note" (link.txt) from your GitHub
            const fileUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPOSITORY_NAME}/main/${FILENAME}?cacheburst=${new Date().getTime()}`;

            try {
                const response = await fetch(fileUrl);
                if (response.ok) {
                    const textLink = await response.text();
                    if (textLink.includes("http")) {
                        btn.href = textLink.trim();
                        btn.style.display = "inline-block";
                    } else {
                        btn.style.display = "none"; // Hide if file is empty
                    }
                } else {
                    btn.style.display = "none"; // Hide if file doesn't exist
                }
            } catch (err) {
                console.log("Could not find registration link.");
                btn.style.display = "none";
            }
        }

        // Run this when the page opens
        window.onload = loadRegistrationLink;
    </script>
</body>
</html>
