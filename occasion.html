<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>SFGC IKS Forum - Events</title>
    <style>
        /* ============================================
            GLOBAL STYLES
           ============================================ */
        html, body { 
            margin: 0; padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            font-size: 11pt;
            line-height: 1.2;
        }
        
        body { 
            font-family: 'Georgia Pro', Georgia, serif;
            background: url('45383.png') no-repeat top center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        header { background-color: rgba(0, 0, 0, 0.6); padding: 20px; text-align: center; }
        h1 { color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); margin: 10px 0; }
        nav ul { list-style: none; padding: 0; display: flex; justify-content: center; gap: 20px; }
        nav a { color: #ffcc66; text-decoration: none; font-weight: bold; font-size: 1.1em; }

        /* Main Container */
        main {
            flex: 1;
            max-width: 900px;
            width: 90%;
            margin: 40px auto;
            padding: 40px 20px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        h2.main-title {
            font-size: 1.8em; color: #ffd700;
            border-bottom: 1px solid #ffcc66;
            display: inline-block; margin-bottom: 35px; width: 80%;
        }

        .event-section {
            margin-bottom: 30px; padding: 25px;
            border-left: 5px solid #BF953F;
            text-align: left; background: rgba(0, 0, 0, 0.3);
            border-radius: 0 15px 15px 0;
        }

        .event-title { color: #ffffff; font-size: 1.2em; margin-bottom: 15px; font-weight: bold; }

        .event-btn {
            color: #ffd700; font-weight: bold; text-decoration: none;
            border: 1px solid #ffd700; padding: 10px 20px;
            border-radius: 5px; display: inline-block;
            transition: all 0.3s ease; margin-right: 15px; margin-top: 10px;
            background: transparent;
        }
        
        .event-btn:hover { background: #ffd700; color: #000; }

        .calendar-container {
            margin-top: 20px; border-radius: 12px; overflow: hidden;
            border: 1px solid #BF953F; background: #fff;
        }

        footer { padding: 30px 20px; text-align: center; background: #1F0505; border-top: 2px solid #BF953F; margin-top: auto; }
        footer p { color: #BF953F; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>SFGC IKS Forum</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="occasion.html">Occasions</a></li>
                <li><a href="committee.html">Committee</a></li>
                <li><a href="about us.html">About Us</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h2 class="main-title">Event Curriculum</h2>
        
        <div class="event-section">
            <p class="event-title">IKS 2026</p>
            <a href="https://drive.google.com/file/d/1TL5xug1Jgy4n2mnmJuXZfuGJwqIck21a/view" target="_blank" class="event-btn">PROSPECTUS</a>
            
            <a href="#" id="dynamic-register-btn" target="_blank" class="event-btn">REGISTER NOW</a>
        </div>
        
        <div class="event-section">
            <p class="event-title">IKS HORIZONS 2025</p>
            <a href="https://drive.google.com/file/d/1TL5xug1Jgy4n2mnmJuXZfuGJwqIck21a/view" target="_blank" class="event-btn">PROSPECTUS</a>
            <a href="https://drive.google.com/drive/folders/1KHlqlGkWQ3xXBlPGiWZRhTSzLBiTzaB0" target="_blank" class="event-btn">VIEW GALLERY</a>
        </div>

        <div class="event-section">
            <p class="event-title">UPCOMING EVENTS CALENDAR</p>
            <div class="calendar-container">
                <iframe src="https://calendar.google.com/calendar/embed?src=iks.sfgc%40gmail.com&ctz=Asia%2FKolkata&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0" 
                        style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>
    </main>

    <footer><p>© All Copyrights Reserved 2026-27<br>SFGC IKS FORUM - SRF INDIA</p></footer>

    <script>
        const GITHUB_USER = "ikssfgc-2025"; 
        const REPO_NAME = "SFGC-IKS-FORUM";
        const FILE_NAME = "link.txt"; 

        async function syncLink() {
            const btn = document.getElementById('dynamic-register-btn');
            const fetchUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${FILE_NAME}?v=${new Date().getTime()}`;

            try {
                const response = await fetch(fetchUrl);
                if (response.ok) {
                    const latestLink = await response.text();
                    const cleanLink = latestLink.trim();
                    
                    if (cleanLink.startsWith("http")) {
                        btn.href = cleanLink;
                    } else {
                        btn.onclick = (e) => { 
                            e.preventDefault(); 
                            alert("Registration link is not properly set in GitHub."); 
                        };
                    }
                }
            } catch (err) {
                console.error("Link fetch failed.");
            }
        }

        // Run sync on load
        window.onload = syncLink;
    </script>
</body>
</html>
