<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - SFGC Hackathon</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020412;
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.5;
        }

        nav {
            position: fixed;
            top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 4, 18, 0.95);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 234, 255, 0.3);
        }

        .logo { color: #00eaff; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 24px; text-decoration: none; }

        .nav-links { display: flex; align-items: center; gap: 30px; }
        .nav-links a { color: #cfefff; text-decoration: none; font-size: 18px; transition: 0.3s; }
        .nav-links a:hover { color: #00eaff; }

        .hamburger {
            display: none; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; width: 40px; height: 40px; border: 2px solid #00eaff;
            border-radius: 8px; background: rgba(0, 234, 255, 0.08); backdrop-filter: blur(6px);
            box-shadow: 0 0 15px rgba(0, 234, 255, 0.5); transition: 0.3s ease;
        }
        .hamburger:hover { transform: scale(1.08); box-shadow: 0 0 25px #00eaff; }
        .hamburger div { width: 20px; height: 2.5px; background: #00eaff; margin: 3px 0; border-radius: 4px; transition: 0.3s; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .logo { font-size: 18px; }
            .nav-links {
                display: none; position: absolute; top: 70px; right: 15px;
                background: rgba(2, 4, 18, 0.98); border: 1px solid #00eaff;
                border-radius: 12px; padding: 20px; flex-direction: column;
                gap: 25px; width: 200px; box-shadow: 0 0 20px rgba(0, 234, 255, 0.4);
            }
            .nav-links.active { display: flex; }
            .nav-links a { font-size: 16px; }
            .hamburger { display: flex; }
        }

        .container {
            max-width: 700px;
            margin: 120px auto 50px;
            padding: 0 20px;
        }

        .glass-panel {
            background: rgba(2, 4, 18, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 234, 255, 0.1);
        }

        h2 { font-family: 'Orbitron'; color: #00eaff; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; margin-bottom: 8px; color: #00eaff; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        /* FIXED: Dark Theme Inputs and Dropdown */
        .form-input, select {
            width: 100%;
            padding: 12px 15px;
            background: #020412; /* Solid dark blue to prevent white glitches */
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            appearance: none; /* Custom arrow logic */
        }

        /* Fix for dropdown options list background */
        select option {
            background-color: #020412;
            color: white;
        }

        /* Custom Arrow for Dropdown */
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: #00eaff;
            position: absolute;
            right: 15px;
            top: 42px;
            pointer-events: none;
        }

        .member-block {
            background: rgba(0, 234, 255, 0.03);
            border-left: 3px solid #00eaff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
        }

        .payment-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 234, 255, 0.2);
            text-align: center;
        }

        .qr-placeholder {
            background: white;
            padding: 10px;
            display: inline-block;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .qr-placeholder img { width: 180px; height: 180px; display: block; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00eaff, #0077ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="index.html" class="logo">SFGC HACKATHON</a>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="about.html">About Us</a>
            <a href="committee.html">Committee</a>
            <a href="reach.html">Reach Us</a>
        </div>
        <div class="hamburger" id="hamburger">
            <div></div><div></div><div></div>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <h2>REGISTRATION</h2>
            
            <form id="registrationForm">
                <div class="form-group select-wrapper">
                    <label>1. Which event are you choosing?</label>
                    <select id="eventDropdown" required onchange="handleEventChange()">
                        <option value="" disabled selected>-- Select Event --</option>
                        <option value="24H Hackathon">24H Hackathon (Team Size: 2-4)</option>
                        <option value="Tech Quiz">Tech Quiz (Solo: 1)</option>
                    </select>
                </div>

                <div id="sizeGroup" class="form-group" style="display:none;">
                    <label id="sizeLabel">2. Team Size:</label>
                    <input type="number" id="teamSizeInput" class="form-input" placeholder="Enter number of members" required>
                    <small id="limitHint" style="color: #00eaff; font-size: 11px; margin-top: 5px; display: block;"></small>
                </div>

                <div id="memberFieldsContainer"></div>

                <div id="finalSection" style="display:none;">
                    <div class="payment-section">
                        <label>Registration Payment</label>
                        <div class="qr-placeholder">
                            <img src="qr_code.png" alt="Scan to Pay">
                        </div>
                        <div class="form-group" style="text-align: left;">
                            <label>Transaction ID / UTR:</label>
                            <input type="text" id="txnId" class="form-input" placeholder="Enter 12-digit ID" required>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-submit">COMPLETE REGISTRATION</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycby_S-i7h8TPzLX-fFq-TGTy1X7rsXFnBuwpSQxNiUKg6FACxfrDRDt-gxp6B_ODrlIl/exec';
        
        const eventDropdown = document.getElementById('eventDropdown');
        const teamSizeInput = document.getElementById('teamSizeInput');
        const memberContainer = document.getElementById('memberFieldsContainer');
        const finalSection = document.getElementById('finalSection');
        const limitHint = document.getElementById('limitHint');
        const submitBtn = document.getElementById('submitBtn');

        let minSize = 1, maxSize = 1;

        // Auto-handle if coming from events.html with URL param
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const eventParam = params.get('event');
            if (eventParam) {
                eventDropdown.value = decodeURIComponent(eventParam);
                handleEventChange();
            }
        };

        function handleEventChange() {
            const selected = eventDropdown.value;
            document.getElementById('sizeGroup').style.display = 'block';
            memberContainer.innerHTML = '';
            finalSection.style.display = 'none';
            teamSizeInput.value = '';

            if (selected === "24H Hackathon") {
                minSize = 2; maxSize = 4;
                limitHint.innerText = "Min 2, Max 4 members.";
            } else {
                minSize = 1; maxSize = 1;
                limitHint.innerText = "Solo entry only.";
                // Auto-fill for solo events
                teamSizeInput.value = 1;
                updateMemberFields(1);
            }
        }

        teamSizeInput.addEventListener('input', () => {
            const size = parseInt(teamSizeInput.value);
            updateMemberFields(size);
        });

        function updateMemberFields(size) {
            memberContainer.innerHTML = '';
            if (size >= minSize && size <= maxSize) {
                finalSection.style.display = 'block';
                for (let i = 1; i <= size; i++) {
                    memberContainer.innerHTML += `
                        <div class="member-block">
                            <h4 style="font-size: 12px; color: #00eaff; margin-bottom: 10px;">MEMBER ${i}</h4>
                            <input type="text" class="m-name form-input" placeholder="Name" required style="margin-bottom:10px;">
                            <input type="text" class="m-college form-input" placeholder="College Name" required style="margin-bottom:10px;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <input type="tel" class="m-phone form-input" placeholder="Phone" required>
                                <input type="email" class="m-email form-input" placeholder="Gmail ID" required>
                            </div>
                        </div>`;
                }
            } else {
                finalSection.style.display = 'none';
            }
        }

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Saving to Excel...";

            let membersArr = [];
            document.querySelectorAll('.member-block').forEach((b, i) => {
                const n = b.querySelector('.m-name').value;
                const c = b.querySelector('.m-college').value;
                const p = b.querySelector('.m-phone').value;
                const em = b.querySelector('.m-email').value;
                membersArr.push(`[M${i+1}: ${n}, ${c}, ${p}, ${em}]`);
            });

            const data = {
                event: eventDropdown.value,
                teamSize: teamSizeInput.value,
                transactionId: document.getElementById('txnId').value,
                members: membersArr.join(" | ")
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("Success! Your registration has been saved.");
                window.location.href = "index.html";
            })
            .catch(err => {
                alert("Error: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "COMPLETE REGISTRATION";
            });
        });

        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops;
        function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w / 20)).fill(1); }
        function draw() { ctx.fillStyle = "rgba(2, 4, 18, 0.1)"; ctx.fillRect(0, 0, w, h); ctx.fillStyle = "#00eaff"; ctx.font = "15px monospace"; drops.forEach((y, i) => { ctx.fillText(Math.floor(Math.random() * 10), i * 20, y * 20); if (y * 20 > h && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        init(); setInterval(draw, 50); window.addEventListener('resize', init);

        // Hamburger Menu
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');
        hamburger.addEventListener('click', () => { navLinks.classList.toggle('active'); });
    </script>
</body>
</html>
