<!DOCTYPE html>
<html>
<head>
    <title>IKS Login & Register</title>

    <style>
        body {
            font-family: Arial;
            background: #0b2a4a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e90ff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .toggle {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: orange;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginBox">
        <h2>Login</h2>

        <input type="text" id="loginUsername" placeholder="ID Card / UUCMS Number">
        <input type="password" id="loginPassword" placeholder="DOB (DD-MM-YYYY)">

        <button onclick="login()">Log In</button>

        <p onclick="forgotPassword()" style="cursor:pointer;color:orange;">
            Forgot Password?
        </p>

        <div class="toggle" onclick="showRegister()">Register?</div>
    </div>

    <!-- REGISTER -->
    <div id="registerBox" class="hidden">
        <h2>Register</h2>

        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Phone Number">
        <input type="text" id="username" placeholder="ID Card / UUCMS Number">
        <input type="password" id="password" placeholder="DOB (DD-MM-YYYY)">
        <input type="text" id="gender" placeholder="Gender">
        <input type="text" id="course" placeholder="Course/Stream">
        <input type="text" id="college" placeholder="College Name & Address">
        <input type="text" id="aadhar" placeholder="Aadhar Number">
        <input type="text" id="parent" placeholder="Parent/Guardian Phone">

        <button onclick="register()">Register</button>

        <div class="toggle" onclick="showLogin()">Back to Login</div>
    </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAkoWeMnqL9sN-Ghxcwq1wye8iml06qBEg",
  authDomain: "iks-portal.firebaseapp.com",
  projectId: "iks-portal",
  storageBucket: "iks-portal.firebasestorage.app",
  messagingSenderId: "850853533746",
  appId: "1:850853533746:web:a224e31b38d784f39a042b",
  measurementId: "G-HTK6G58N60"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// TOGGLE
window.showRegister = () => {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
};

window.showLogin = () => {
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
};

// REGISTER
window.register = async () => {
    const email = document.getElementById("email").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const userRef = doc(db, "users", username);
    const existing = await getDoc(userRef);

    if (existing.exists()) {
        alert("Username already taken!");
        return;
    }

    try {
        await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(userRef, {
            name: document.getElementById("name").value,
            email,
            phone: document.getElementById("phone").value,
            gender: document.getElementById("gender").value,
            course: document.getElementById("course").value,
            college: document.getElementById("college").value,
            aadhar: document.getElementById("aadhar").value,
            parent: document.getElementById("parent").value
        });

        alert("Registered Successfully!");
        showLogin();

    } catch (err) {
        alert(err.message);
    }
};

// LOGIN
window.login = async () => {
    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;

    const userRef = doc(db, "users", username);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
        alert("User not found!");
        return;
    }

    const email = snap.data().email;

    try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
    } catch {
        alert("Invalid credentials");
    }
};

// FORGOT PASSWORD
window.forgotPassword = async () => {
    const username = document.getElementById("loginUsername").value;

    if (!username) {
        alert("Enter Username first");
        return;
    }

    const userRef = doc(db, "users", username);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
        alert("User not found");
        return;
    }

    const email = snap.data().email;

    await sendPasswordResetEmail(auth, email);
    alert("Password reset link sent to your email");
};
</script>

</body>
</html>
