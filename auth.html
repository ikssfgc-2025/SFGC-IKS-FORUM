<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS - Student Portal</title>
    <style>
        :root {
            --gold-primary: #BF953F;
            --gold-light: #FCF6BA;
            --gold-dark: #B38728;
            --bg-overlay: rgba(0, 0, 0, 0.9);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        html, body { margin: 0; padding: 0; min-height: 100vh; font-family: 'Georgia', serif; }
        
        body {
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #fdf5e6;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold-primary);
        }

        .portal-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .auth-container {
            background: var(--bg-overlay);
            width: 100%; max-width: 550px;
            padding: 30px; border-radius: 15px;
            border: 2px solid var(--gold-primary);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-height: 90vh; overflow-y: auto;
        }

        h2 { color: #ffd700; text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--gold-primary); padding-bottom: 10px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        label { display: block; color: #ffcc66; font-size: 0.8em; margin-bottom: 5px; font-weight: bold; }

        input, select, textarea {
            width: 100%; padding: 10px; background: var(--input-bg);
            border: 1px solid var(--gold-primary); color: #fff;
            border-radius: 5px; box-sizing: border-box;
        }

        select option { background-color: #1a1a1a; color: #ffd700; }

        .btn-gold {
            width: 100%; padding: 15px; margin-top: 20px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            border: none; color: #000; font-weight: 900; cursor: pointer;
            border-radius: 6px; text-transform: uppercase;
        }

        .auth-footer-links { text-align: center; margin-top: 15px; font-size: 0.85em; }
        .link-gold { color: #ffd700; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }

        footer { padding: 15px; text-align: center; border-top: 1px solid var(--gold-primary); background: #1a0505; }
        
        /* Custom Scrollbar for the gold look */
        .auth-container::-webkit-scrollbar { width: 5px; }
        .auth-container::-webkit-scrollbar-thumb { background: var(--gold-primary); border-radius: 10px; }
    </style>
</head>
<body>

    <header><h1 style="color:#ffd700; margin:0;">SFGC IKS Portal</h1></header>

    <div class="portal-wrapper">
        <div class="auth-container">
            
            <div id="login-ui">
                <h2>Student Login</h2>
                <label>College ID</label>
                <input type="text" id="l-user">
                <label>Password</label>
                <input type="password" id="l-pass">
                <button class="btn-gold" onclick="login()">Enter Portal</button>
                <div class="auth-footer-links">
                    <span class="link-gold" onclick="showUI('forgot-ui')">Forgot Password?</span>
                    <p>New here? <b class="link-gold" onclick="showUI('reg-ui')">Register Now</b></p>
                </div>
            </div>

            <div id="reg-ui" class="hidden">
                <h2>Student Registration</h2>
                <div class="form-grid">
                    <div class="full-width">
                        <label>Full Name</label>
                        <input type="text" id="r-name">
                    </div>
                    <div>
                        <label>Email ID</label>
                        <input type="email" id="r-email">
                    </div>
                    <div>
                        <label>Phone Number</label>
                        <input type="tel" id="r-phone" maxlength="10">
                    </div>
                    <div>
                        <label>Gender</label>
                        <select id="r-gender">
                            <option value="" disabled selected>Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div>
                        <label>Course / Stream</label>
                        <input type="text" id="r-course" placeholder="e.g. BCA, B.Com">
                    </div>
                    <div class="full-width">
                        <label>College Name & Address</label>
                        <input type="text" id="r-college">
                    </div>
                    <div>
                        <label>Aadhar Card Number</label>
                        <input type="text" id="r-aadhar" maxlength="12">
                    </div>
                    <div>
                        <label>Parent/Guardian Name</label>
                        <input type="text" id="r-parent-name">
                    </div>
                    <div class="full-width">
                        <label>Parent/Guardian Phone</label>
                        <input type="tel" id="r-parent-phone" maxlength="10">
                    </div>
                </div>
                <button class="btn-gold" id="reg-btn" onclick="register()">Create Account</button>
                <div class="auth-footer-links">
                    <p>Already have an account? <b class="link-gold" onclick="showUI('login-ui')">Login</b></p>
                </div>
            </div>

            <div id="forgot-ui" class="hidden">
                <h2>Recover Access</h2>
                <label>Mobile Number</label>
                <input type="tel" id="f-phone" maxlength="10">
                <button class="btn-gold" id="otp-send-btn" onclick="sendSMSOTP()">Get OTP via SMS</button>
                <div class="auth-footer-links"><span class="link-gold" onclick="showUI('login-ui')">Back</span></div>
            </div>

            <div id="otp-ui" class="hidden">
                <h2>Verify Code</h2>
                <input type="text" id="otp-input" maxlength="6" style="text-align:center; font-size:1.5em;">
                <button class="btn-gold" onclick="verifyOTP()">Verify</button>
            </div>

            <div id="reset-ui" class="hidden">
                <h2>New Password</h2>
                <label>New Password</label>
                <input type="password" id="new-pass">
                <button class="btn-gold" onclick="updatePassword()">Update</button>
            </div>

        </div>
    </div>

    <footer><p>© 2026 | Seshadripuram First Grade College</p></footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhyDtmFiAJvGFzGo04WWbl3KiptOMwAnpRK3BmupovYmLro93QiD57LCBMmLtgtyE1/exec";

        function showUI(id) {
            ['login-ui', 'reg-ui', 'forgot-ui', 'otp-ui', 'reset-ui'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function register() {
            const btn = document.getElementById("reg-btn");
            const data = {
                action: "register",
                name: document.getElementById("r-name").value,
                email: document.getElementById("r-email").value,
                phone: document.getElementById("r-phone").value,
                gender: document.getElementById("r-gender").value,
                course: document.getElementById("r-course").value,
                college: document.getElementById("r-college").value,
                aadhar: document.getElementById("r-aadhar").value,
                parentName: document.getElementById("r-parent-name").value,
                parentPhone: document.getElementById("r-parent-phone").value
            };

            if(!data.name || !data.phone || !data.aadhar) return alert("Please fill Name, Phone and Aadhar.");
            
            btn.innerText = "REGISTERING..."; btn.disabled = true;

            await fetch(SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify(data)
            });

            alert("Registration successful! Details saved to database.");
            showUI('login-ui');
            btn.innerText = "Create Account"; btn.disabled = false;
        }

        async function sendSMSOTP() {
            const phone = document.getElementById("f-phone").value;
            if(phone.length < 10) return alert("Enter 10-digit number");
            document.getElementById("otp-send-btn").innerText = "SENDING...";
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "sendSMS", phone: phone }) });
            showUI('otp-ui');
        }

        function verifyOTP() { if(document.getElementById("otp-input").value.length === 6) showUI('reset-ui'); }
        function updatePassword() { alert("Password Updated!"); showUI('login-ui'); }
        function login() { window.location.href = "home.html"; }
    </script>
</body>
</html>
