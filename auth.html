<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKS Portal | Student Access</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Made background image clearly visible with a light gradient overlay */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; /* All main font changed to white */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
        }

        .container {
            width: 90%;
            max-width: 480px;
            /* Changed to a matching Refined Grey */
            background: rgba(45, 55, 65, 0.9); 
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
            /* Golden line border now strictly inside the container */
            border: 2px solid #d4af37; 
            margin: 40px 0;
        }

        h2 { 
            text-align: center; 
            color: #ffffff; /* Font changed to white */
            margin-bottom: 25px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; }
        
        /* Label font changed to white */
        label { 
            display: block; 
            font-size: 12px; 
            color: #ffffff; 
            margin-bottom: 5px; 
            margin-left: 5px; 
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #1a2a3a;
            box-sizing: border-box;
            background: #020b14;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        /* Input focus changed to Golden */
        input:focus { 
            border-color: #d4af37; 
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); 
        }

        button {
            width: 100%;
            padding: 14px;
            /* Button changed to Golden */
            background: #d4af37; 
            color: #020b14; /* Dark text for contrast on gold */
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { 
            background: #f1c40f; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .toggle {
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
            color: #ffffff; /* Toggle text changed to white */
            font-size: 14px;
            text-decoration: underline;
            transition: 0.3s;
        }

        .toggle:hover {
            color: #d4af37; /* Hovers to Gold */
        }

        .hidden { display: none; }
        
        /* Custom Scrollbar changed to Golden */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020b14; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginBox">
        <h2>Student Login</h2>
        <div class="input-group">
            <label>UUCMS NUMBER</label>
            <input type="text" id="loginUsername" placeholder="Enter UUCMS Number">
        </div>
        <div class="input-group">
            <label>DATE OF BIRTH</label>
            <input type="password" id="loginPassword" placeholder="DD-MM-YYYY">
        </div>
        <button onclick="login()">Access Portal</button>
        <div class="toggle" onclick="showRegister()">New Student? Register Here</div>
    </div>

    <div id="registerBox" class="hidden">
        <h2>Registration</h2>
        <div class="input-group"><label>FULL NAME</label><input type="text" id="name" placeholder="As per records"></div>
        <div class="input-group"><label>EMAIL ADDRESS</label><input type="email" id="email" placeholder="example@mail.com"></div>
        <div class="input-group"><label>PHONE NUMBER</label><input type="text" id="phone" placeholder="10-digit mobile"></div>
        <div class="input-group"><label>UUCMS / ID NUMBER</label><input type="text" id="username" placeholder="UUCMS Number"></div>
        <div class="input-group"><label>SET PASSWORD (DOB)</label><input type="password" id="password" placeholder="DD-MM-YYYY"></div>
        <div class="input-group"><label>GENDER</label><input type="text" id="gender" placeholder="Male/Female"></div>
        <div class="input-group"><label>COURSE/STREAM</label><input type="text" id="course" placeholder="B.Com / B.Sc / BCA"></div>
        <div class="input-group"><label>COLLEGE NAME</label><input type="text" id="college" placeholder="Full College Address"></div>
        <div class="input-group"><label>AADHAR NUMBER</label><input type="text" id="aadhar" placeholder="12-digit number"></div>
        <div class="input-group"><label>PARENT PHONE</label><input type="text" id="parent" placeholder="Guardian contact"></div>
        
        <button onclick="register()">Create Account</button>
        <div class="toggle" onclick="showLogin()">Already registered? Login</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAkoWeMnqL9sN-Ghxcwq1wye8iml06qBEg",
        authDomain: "iks-portal.firebaseapp.com",
        projectId: "iks-portal",
        storageBucket: "iks-portal.firebasestorage.app",
        messagingSenderId: "850853533746",
        appId: "1:850853533746:web:a224e31b38d784f39a042b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.showRegister = () => {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("registerBox").classList.remove("hidden");
        window.scrollTo(0,0);
    };

    window.showLogin = () => {
        document.getElementById("registerBox").classList.add("hidden");
        document.getElementById("loginBox").classList.remove("hidden");
    };

    window.register = async () => {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if(!email || !username || !password) return alert("Please fill in Name, UUCMS, and DOB!");

        try {
            const userRef = doc(db, "users", username);
            const existing = await getDoc(userRef);
            if (existing.exists()) return alert("UUCMS Number already registered!");

            await createUserWithEmailAndPassword(auth, email, password);

            await setDoc(userRef, {
                name: document.getElementById("name").value,
                email: email,
                phone: document.getElementById("phone").value,
                username: username,
                gender: document.getElementById("gender").value,
                course: document.getElementById("course").value,
                college: document.getElementById("college").value,
                aadhar: document.getElementById("aadhar").value,
                parent: document.getElementById("parent").value,
                createdAt: new Date()
            });

            alert("Registration Successful!");
            window.location.href = "dashboard.html";
        } catch (err) {
            alert("Registration Error: " + err.message);
        }
    };

    window.login = async () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();

        if(!username || !password) return alert("Enter UUCMS and DOB");

        try {
            const userRef = doc(db, "users", username);
            const snap = await getDoc(userRef);

            if (!snap.exists()) {
                alert("UUCMS Number not found. Please register first.");
                return;
            }

            const email = snap.data().email;
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "dashboard.html";
        } catch (err) {
            alert("Login Failed: Please check your UUCMS or DOB format.");
        }
    };
</script>

</body>
</html>
