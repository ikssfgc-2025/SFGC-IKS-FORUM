<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS - Student Portal</title>
    <style>
        /* ============================================
           GLOBAL THEME & BACKGROUND
           ============================================ */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            font-family: 'Georgia Pro', Georgia, serif;
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #fdf5e6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px;
            box-sizing: border-box;
        }

        /* ============================================
           AUTH CARD - GLASSMORPHISM
           ============================================ */
        .auth-container {
            background: rgba(0, 0, 0, 0.85);
            width: 100%;
            max-width: 600px;
            padding: 35px;
            border-radius: 20px;
            border: 2px solid #BF953F;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Custom Gold Scrollbar */
        .auth-container::-webkit-scrollbar { width: 6px; }
        .auth-container::-webkit-scrollbar-thumb { background: #BF953F; border-radius: 10px; }

        h2 { 
            color: #ffd700; 
            text-align: center; 
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #BF953F;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }
        .form-group { margin-bottom: 10px; }
        
        label { 
            display: block; 
            color: #ffcc66; 
            font-size: 0.85em; 
            margin-bottom: 6px; 
            font-weight: bold;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid #BF953F;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input:focus { border-color: #ffd700; outline: none; background: rgba(255, 255, 255, 0.12); }

        .btn-gold {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 50%, #B38728 100%);
            border: none;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            color: #ffcc66;
            cursor: pointer;
            display: block;
            font-size: 0.9em;
        }

        .toggle-link span { color: #ffd700; text-decoration: underline; font-weight: bold; }
        .hidden { display: none; }

        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="auth-container">
    <div id="reg-ui">
        <h2>Student Registration</h2>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Full Name</label>
                <input type="text" id="r-name" placeholder="As per ID card">
            </div>
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="r-email" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="r-phone" placeholder="+91">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="r-gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Course / Stream</label>
                <input type="text" id="r-course" placeholder="e.g. BCA, BCOM">
            </div>
            <div class="form-group full-width">
                <label>College Name with Address</label>
                <textarea id="r-college" rows="2" placeholder="Full college address"></textarea>
            </div>
            <div class="form-group">
                <label>Aadhar Card Number</label>
                <input type="text" id="r-aadhar" maxlength="12" placeholder="12 Digit Number">
            </div>
            <div class="form-group">
                <label>Parent / Guardian Phone</label>
                <input type="tel" id="r-parent" placeholder="Emergency contact">
            </div>
            <div class="form-group">
                <label>Create Username</label>
                <input type="text" id="r-user" placeholder="Unique ID">
            </div>
            <div class="form-group">
                <label>Password (ID Card Number)</label>
                <input type="password" id="r-pass" placeholder="Your College ID No.">
            </div>
        </div>
        <button class="btn-gold" onclick="registerToSheet()">CREATE ACCOUNT</button>
        <div class="toggle-link" onclick="toggleView()">Already Registered? <span>Login</span></div>
    </div>

    <div id="login-ui" class="hidden">
        <h2>Member Login</h2>
        <div class="form-group"><label>Username</label><input type="text" id="l-user"></div>
        <div class="form-group"><label>Password (ID Card Number)</label><input type="password" id="l-pass"></div>
        <button class="btn-gold" onclick="login()">ENTER PORTAL</button>
        <div class="toggle-link" onclick="showForgot()">Forgot Password?</div>
        <div class="toggle-link" onclick="toggleView()">New Member? <span>Register</span></div>
    </div>

    <div id="forgot-ui" class="hidden">
        <h2>Recover Account</h2>
        <p style="text-align:center; font-size: 0.8em; color: #ffcc66;">OTP will be sent to registered Email & SMS</p>
        <div class="form-group"><label>Registered Email</label><input type="email" id="f-email"></div>
        <button class="btn-gold" onclick="sendSimulatedOTP()">SEND OTP</button>
        <div id="otp-entry" class="hidden">
            <div class="form-group" style="margin-top:15px"><label>Enter OTP</label><input type="text" id="f-otp" placeholder="123456"></div>
            <button class="btn-gold" onclick="verifyAndLogin()">VERIFY & LOGIN</button>
        </div>
        <div class="toggle-link" onclick="toggleView()">Back to Login</div>
    </div>
</div>

<script>
    // Replace with your Web App URL from Google Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';

    function toggleView() {
        document.getElementById('reg-ui').classList.add('hidden');
        document.getElementById('login-ui').classList.add('hidden');
        document.getElementById('forgot-ui').classList.add('hidden');
        if (event.currentTarget.innerText.includes("Login") || event.currentTarget.innerText.includes("Back")) {
            document.getElementById('login-ui').classList.remove('hidden');
        } else {
            document.getElementById('reg-ui').classList.remove('hidden');
        }
    }

    function showForgot() {
        document.getElementById('login-ui').classList.add('hidden');
        document.getElementById('forgot-ui').classList.remove('hidden');
    }

    async function registerToSheet() {
        const btn = document.querySelector('.btn-gold');
        const data = {
            name: document.getElementById('r-name').value,
            email: document.getElementById('r-email').value,
            phone: document.getElementById('r-phone').value,
            gender: document.getElementById('r-gender').value,
            course: document.getElementById('r-course').value,
            college: document.getElementById('r-college').value,
            aadhar: document.getElementById('r-aadhar').value,
            parentPhone: document.getElementById('r-parent').value,
            username: document.getElementById('r-user').value,
            password: document.getElementById('r-pass').value
        };

        if(!data.name || !data.email || data.aadhar.length < 12) {
            alert("Please provide valid details and 12-digit Aadhar.");
            return;
        }

        btn.innerText = "SAVING DATA...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Registration Successful! Data saved to IKS Database.");
            location.reload(); 
        } catch (e) {
            alert("Database Connection Error.");
            btn.disabled = false;
        }
    }

    function sendSimulatedOTP() {
        alert("OTP: 123456 has been sent to your registered contact.");
        document.getElementById('otp-entry').classList.remove('hidden');
    }

    function verifyAndLogin() {
        if(document.getElementById('f-otp').value === "123456") {
            window.location.href = "home.html";
        } else {
            alert("Incorrect OTP");
        }
    }

    function login() {
        // Simplified login for prototype
        window.location.href = "home.html";
    }
</script>

</body>
</html>
