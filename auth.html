<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKS Login & Register</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b2a4a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h2 { text-align: center; color: #f39c12; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
            background: #f0f0f0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { background: #e67e22; }

        .toggle {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #3498db;
            font-size: 14px;
        }

        .hidden { display: none; }
        
        .forgot-pass {
            text-align: right;
            font-size: 13px;
            color: #bdc3c7;
            cursor: pointer;
            margin-top: -5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginBox">
        <h2>Student Login</h2>
        <input type="text" id="loginUsername" placeholder="UUCMS Number">
        <input type="password" id="loginPassword" placeholder="DOB (DD-MM-YYYY)">
        <button onclick="login()">Log In</button>
        <div class="toggle" onclick="showRegister()">Register</div>
    </div>

    <div id="registerBox" class="hidden">
        <h2>Student Registration</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="text" id="phone" placeholder="Phone Number">
        <input type="text" id="username" placeholder="ID Card / UUCMS Number">
        <input type="password" id="password" placeholder="DOB (DD-MM-YYYY)">
        <input type="text" id="gender" placeholder="Gender">
        <input type="text" id="course" placeholder="Course/Stream">
        <input type="text" id="college" placeholder="College Name & Address">
        <input type="text" id="aadhar" placeholder="Aadhar Number">
        <input type="text" id="parent" placeholder="Parent/Guardian Phone">
        <button onclick="register()">Register</button>
        <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
    </div>
</div>

<script type="module">
    // Using a more stable Firebase version (10.8.0)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAkoWeMnqL9sN-Ghxcwq1wye8iml06qBEg",
        authDomain: "iks-portal.firebaseapp.com",
        projectId: "iks-portal",
        storageBucket: "iks-portal.firebasestorage.app",
        messagingSenderId: "850853533746",
        appId: "1:850853533746:web:a224e31b38d784f39a042b",
        measurementId: "G-HTK6G58N60"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // TOGGLE BOXES
    window.showRegister = () => {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("registerBox").classList.remove("hidden");
    };

    window.showLogin = () => {
        document.getElementById("registerBox").classList.add("hidden");
        document.getElementById("loginBox").classList.remove("hidden");
    };

    // AUTO-DETECT FROM NAV LINK (Login/Register)
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'register') showRegister();
        else showLogin();
    });

    // REGISTER LOGIC
    window.register = async () => {
        const email = document.getElementById("email").value;
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if(!email || !username || !password) return alert("Please fill basic fields!");

        const userRef = doc(db, "users", username);
        const existing = await getDoc(userRef);

        if (existing.exists()) {
            alert("UUCMS Number already registered!");
            return;
        }

        try {
            await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(userRef, {
                name: document.getElementById("name").value,
                email: email,
                phone: Number(document.getElementById("phone").value),
                username: username,
                gender: document.getElementById("gender").value,
                course: document.getElementById("course").value,
                college: document.getElementById("college").value,
                aadhar: Number(document.getElementById("aadhar").value),
                parent: Number(document.getElementById("parent").value),
                createdAt: new Date()
            });
            alert("Registration Successful!");
            window.location.href = "dashboard.html";
        } catch (err) {
            alert("Error: " + err.message);
        }
    };

    // LOGIN LOGIC
    window.login = async () => {
        const username = document.getElementById("loginUsername").value;
        const password = document.getElementById("loginPassword").value;

        if(!username) return alert("Enter your UUCMS Number");

        const userRef = doc(db, "users", username);
        const snap = await getDoc(userRef);

        if (!snap.exists()) {
            alert("Account not found. Please Register first.");
            return;
        }

        try {
            const email = snap.data().email;
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "dashboard.html";
        } catch (err) {
            alert("Login Failed: Please check your password (DOB).");
        }
    };

    // FORGOT PASSWORD
    window.forgotPassword = async () => {
        const username = document.getElementById("loginUsername").value;
        if (!username) return alert("Enter Username/ID Card Number first");

        const userRef = doc(db, "users", username);
        const snap = await getDoc(userRef);

        if (!snap.exists()) return alert("User not found");

        try {
            await sendPasswordResetEmail(auth, snap.data().email);
            alert("Reset link sent to your registered email!");
        } catch (err) {
            alert(err.message);
        }
    };
</script>

</body>
</html>
