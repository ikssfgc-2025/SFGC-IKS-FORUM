<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS - Student Portal</title>
    <style>
        :root {
            --gold-primary: #BF953F;
            --gold-light: #FCF6BA;
            --gold-dark: #B38728;
            --bg-overlay: rgba(0, 0, 0, 0.85);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        html, body { margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        
        body {
            font-family: 'Georgia', serif;
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #fdf5e6;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid var(--gold-primary);
        }

        h1 { color: #ffd700; margin: 10px 0; font-size: 1.8em; text-shadow: 0 2px 4px #000; }

        .portal-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 15px; }

        .auth-container {
            background: var(--bg-overlay);
            width: 100%; max-width: 500px;
            padding: 35px; border-radius: 15px;
            border: 2px solid var(--gold-primary);
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        h2 { color: #ffd700; text-align: center; margin-bottom: 25px; border-bottom: 1px solid var(--gold-primary); padding-bottom: 10px; }

        label { display: block; color: #ffcc66; font-size: 0.85em; margin-bottom: 6px; font-weight: bold; }

        input, select {
            width: 100%; padding: 12px; background: var(--input-bg);
            border: 1px solid var(--gold-primary); color: #fff;
            border-radius: 6px; box-sizing: border-box; margin-bottom: 15px;
        }

        /* FIXED: Gender Dropdown Visibility for Mobile/Dark Theme */
        select option {
            background-color: #1a1a1a; 
            color: #ffd700;
        }

        .btn-gold {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            border: none; color: #000; font-weight: 900; cursor: pointer;
            border-radius: 6px; text-transform: uppercase; transition: 0.3s;
        }

        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }

        .auth-footer-links { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .link-gold { color: #ffd700; cursor: pointer; text-decoration: none; font-weight: bold; }

        .hidden { display: none !important; }

        footer { padding: 20px; text-align: center; border-top: 2px solid var(--gold-primary); background: #1a0505; }
    </style>
</head>
<body>

    <header><h1>SFGC IKS Portal</h1></header>

    <div class="portal-wrapper">
        <div class="auth-container">
            
            <div id="login-ui">
                <h2>Student Login</h2>
                <label>College ID</label>
                <input type="text" id="l-user" placeholder="Enter Username">
                <label>Password</label>
                <input type="password" id="l-pass" placeholder="••••••••">
                <button class="btn-gold" onclick="login()">Enter Portal</button>
                <div class="auth-footer-links">
                    <span class="link-gold" onclick="showUI('forgot-ui')">Forgot Password?</span>
                    <p>New here? <b class="link-gold" onclick="showUI('reg-ui')">Register Now</b></p>
                </div>
            </div>

            <div id="reg-ui" class="hidden">
                <h2>Registration</h2>
                <label>Full Name</label>
                <input type="text" id="r-name">
                <label>Email ID</label>
                <input type="email" id="r-email">
                <label>Gender</label>
                <select id="r-gender">
                    <option value="" disabled selected>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
                <button class="btn-gold" id="reg-btn" onclick="register()">Create Account</button>
                <div class="auth-footer-links">
                    <p>Already have an account? <b class="link-gold" onclick="showUI('login-ui')">Login</b></p>
                </div>
            </div>

            <div id="forgot-ui" class="hidden">
                <h2>Recover Access</h2>
                <p style="text-align: center; font-size: 0.8em; color: #ccc;">Enter your mobile to get an OTP.</p>
                <label>Phone Number</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" value="+91" style="width: 50px;" disabled>
                    <input type="tel" id="f-phone" maxlength="10" placeholder="7019xxxxxx">
                </div>
                <button class="btn-gold" id="otp-send-btn" onclick="sendSMSOTP()">Get OTP via SMS</button>
                <div class="auth-footer-links">
                    <b class="link-gold" onclick="showUI('login-ui')">Back to Login</b>
                </div>
            </div>

            <div id="otp-ui" class="hidden">
                <h2>Verify SMS</h2>
                <input type="text" id="otp-input" maxlength="6" style="text-align: center; font-size: 1.8em; letter-spacing: 10px;" placeholder="000000">
                <button class="btn-gold" onclick="verifyOTP()">Verify Code</button>
                <div class="auth-footer-links">
                    <p id="timer-box">Resend in <span id="seconds">30</span>s</p>
                    <span id="resend-link" class="link-gold hidden" onclick="sendSMSOTP()">Resend SMS</span>
                </div>
            </div>

            <div id="reset-ui" class="hidden">
                <h2>New Password</h2>
                <label>New Password</label>
                <input type="password" id="new-pass" placeholder="Min 6 characters">
                <label>Confirm Password</label>
                <input type="password" id="confirm-pass" placeholder="Re-enter password">
                <button class="btn-gold" onclick="updatePassword()">Update Password</button>
            </div>

        </div>
    </div>

    <footer>
        <p>© 2026 | Seshadripuram First Grade College</p>
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhyDtmFiAJvGFzGo04WWbl3KiptOMwAnpRK3BmupovYmLro93QiD57LCBMmLtgtyE1/exec";
        let generatedOTP = "";

        function showUI(id) {
            ['login-ui', 'reg-ui', 'forgot-ui', 'otp-ui', 'reset-ui'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function register() {
            const name = document.getElementById("r-name").value;
            const email = document.getElementById("r-email").value;
            const gender = document.getElementById("r-gender").value;
            const btn = document.getElementById("reg-btn");

            if(!name || !email || !gender) return alert("Fill all fields");
            
            btn.innerText = "REGISTERING..."; btn.disabled = true;

            await fetch(SCRIPT_URL, {
                method: "POST", 
                mode: "no-cors",
                body: JSON.stringify({ action: "register", name, email, gender })
            });

            alert("Registration data sent to SFGC Database!");
            showUI('login-ui');
            btn.innerText = "Create Account"; btn.disabled = false;
        }

        async function sendSMSOTP() {
            const phone = document.getElementById("f-phone").value;
            const btn = document.getElementById("otp-send-btn");
            if(phone.length < 10) return alert("Enter 10-digit number");

            btn.innerText = "SENDING SMS..."; btn.disabled = true;

            await fetch(SCRIPT_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ action: "sendSMS", phone: phone })
            });

            alert("OTP Request triggered for " + phone);
            showUI('otp-ui');
            startTimer();
            btn.innerText = "Get OTP via SMS"; btn.disabled = false;
        }

        function startTimer() {
            let sec = 30;
            const timerBox = document.getElementById("timer-box");
            const resendLink = document.getElementById("resend-link");
            timerBox.classList.remove("hidden"); resendLink.classList.add("hidden");
            const countdown = setInterval(() => {
                sec--;
                document.getElementById("seconds").innerText = sec;
                if (sec <= 0) {
                    clearInterval(countdown);
                    timerBox.classList.add("hidden"); resendLink.classList.remove("hidden");
                }
            }, 1000);
        }

        function verifyOTP() {
            const input = document.getElementById("otp-input").value;
            if (input.length === 6) { 
                showUI('reset-ui');
            } else {
                alert("Enter 6-digit OTP");
            }
        }

        function updatePassword() {
            const p1 = document.getElementById("new-pass").value;
            const p2 = document.getElementById("confirm-pass").value;
            if (p1.length < 6 || p1 !== p2) return alert("Passwords must match and be 6+ chars");
            alert("Password successfully reset!");
            showUI('login-ui');
        }

        function login() { window.location.href = "home.html"; }
    </script>
</body>
</html>
