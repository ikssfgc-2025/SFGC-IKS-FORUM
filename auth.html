<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS - Student Portal</title>
    <style>
        :root {
            --gold-primary: #BF953F;
            --gold-light: #FCF6BA;
            --gold-dark: #B38728;
            --bg-overlay: rgba(0, 0, 0, 0.85);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        html, body { margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        
        body {
            font-family: 'Georgia', serif;
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #fdf5e6;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid var(--gold-primary);
            z-index: 1000;
        }

        h1 { color: #ffd700; margin: 10px 0; font-size: 1.8em; text-shadow: 0 2px 4px #000; }

        nav ul {
            list-style: none; padding: 0; display: flex;
            justify-content: center; gap: 25px; flex-wrap: wrap; margin-top: 10px;
        }

        nav a { color: #ffcc66; text-decoration: none; font-weight: bold; font-size: 0.95em; }

        .hamburger {
            display: none; flex-direction: column; cursor: pointer;
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
        }

        .hamburger div { width: 25px; height: 3px; background: #ffd700; margin: 3px 0; }

        .portal-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 15px; }

        .auth-container {
            background: var(--bg-overlay);
            width: 100%; max-width: 550px;
            padding: 35px; border-radius: 15px;
            border: 2px solid var(--gold-primary);
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        h2 { 
            color: #ffd700; text-align: center; margin-bottom: 25px; 
            text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 1px solid var(--gold-primary); padding-bottom: 10px;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .full-width { grid-column: span 2; }

        label { display: block; color: #ffcc66; font-size: 0.85em; margin-bottom: 6px; font-weight: bold; }

        input, select, textarea {
            width: 100%; padding: 12px; background: var(--input-bg);
            border: 1px solid var(--gold-primary); color: #fff;
            border-radius: 6px; box-sizing: border-box; font-family: inherit;
        }

        /* FIXED: Gender Dropdown Visibility */
        select option {
            background-color: #1a1a1a; 
            color: #ffd700;
        }

        .input-wrapper { position: relative; }

        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; font-size: 0.65em; color: #ffd700; font-weight: 900;
        }

        .btn-gold {
            width: 100%; padding: 15px; margin-top: 25px;
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            border: none; color: #000; font-weight: 900; cursor: pointer;
            border-radius: 6px; text-transform: uppercase;
        }

        .auth-footer-links { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .link-gold { color: #ffd700; cursor: pointer; }

        footer {
            padding: 30px; text-align: center;
            background: linear-gradient(to right, #1F0505, #3B0D0D, #1F0505);
            border-top: 2px solid var(--gold-primary);
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            nav ul {
                display: none; flex-direction: column; position: absolute;
                top: 75px; right: 20px; width: 200px; background: rgba(0,0,0,0.95);
                border: 1px solid var(--gold-primary); padding: 15px; border-radius: 8px;
            }
            nav ul.active { display: flex; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hamburger" onclick="toggleMenu()"><div></div><div></div><div></div></div>
        <h1>SFGC IKS Forum</h1>
        <nav>
            <ul id="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="occasion.html">Occasions</a></li>
                <li><a href="committee.html">Committee</a></li>
                <li><a href="auth.html" style="color:#fff;">Portal Access</a></li>
            </ul>
        </nav>
    </header>

    <div class="portal-wrapper">
        <div class="auth-container">
            
            <div id="login-ui">
                <h2>Portal Login</h2>
                <label>Username</label>
                <input type="text" id="l-user" placeholder="Enter ID">
                <label style="margin-top:15px;">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="l-pass" placeholder="••••••••">
                    <span class="toggle-password" onclick="togglePass('l-pass')">SHOW</span>
                </div>
                <button class="btn-gold" onclick="login()">Enter Portal</button>
                <div class="auth-footer-links">
                    <span class="link-gold" onclick="showUI('forgot-ui')">Forgot Password?</span>
                    <p>New Student? <b class="link-gold" onclick="showUI('reg-ui')">Register</b></p>
                </div>
            </div>

            <div id="reg-ui" class="hidden">
                <h2>Registration</h2>
                <div class="form-grid">
                    <div class="full-width">
                        <label>Full Name</label>
                        <input type="text" id="r-name">
                    </div>
                    <div>
                        <label>Email ID</label>
                        <input type="email" id="r-email">
                    </div>
                    <div>
                        <label>Gender</label>
                        <select id="r-gender">
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <button class="btn-gold" onclick="register()">Create Account</button>
                <div class="auth-footer-links">
                    <p>Already Registered? <b class="link-gold" onclick="showUI('login-ui')">Login</b></p>
                </div>
            </div>

            <div id="forgot-ui" class="hidden">
                <h2>Recover Access</h2>
                <label>Registered Email</label>
                <input type="email" id="f-email" placeholder="example@sfgc.ac.in">
                <button class="btn-gold" id="otp-btn" onclick="sendOTP()">Send Security Code</button>
                <div class="auth-footer-links">
                    <b class="link-gold" onclick="showUI('login-ui')">Back to Login</b>
                </div>
            </div>

            <div id="otp-ui" class="hidden">
                <h2>Verify Code</h2>
                <input type="text" id="otp-input" maxlength="6" style="text-align: center; font-size: 1.5em;" placeholder="000000">
                <button class="btn-gold" onclick="verifyOTP()">Verify OTP</button>
            </div>

        </div>
    </div>

    <footer><p>© 2026-27 | SFGC IKS FORUM</p></footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAw5f8K2mtQ0DV2Z26yQrgrHMByi9jiUCHyssiiHA1AP1VXJMvL6UoRr8YmC8eT5x2/exec";
        let generatedOTP = "";

        function toggleMenu() { document.getElementById("nav-menu").classList.toggle("active"); }

        function showUI(uiId) {
            ['login-ui', 'reg-ui', 'forgot-ui', 'otp-ui'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(uiId).classList.remove('hidden');
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === "password" ? "text" : "password";
        }

        async function sendOTP() {
            const email = document.getElementById("f-email").value;
            const btn = document.getElementById("otp-btn");
            if (!email) return alert("Enter Email");

            btn.innerText = "SENDING...";
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ "email": email, "action": "sendOTP" })
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    generatedOTP = result.otp;
                    alert("OTP sent to your email!");
                    showUI('otp-ui');
                } else {
                    alert("Error: " + result.message);
                }
            } catch (e) {
                // If CORS blocks the response but email is sent:
                alert("Please check your email for the OTP.");
                showUI('otp-ui');
            } finally {
                btn.innerText = "Send Security Code";
                btn.disabled = false;
            }
        }

        function verifyOTP() {
            const entered = document.getElementById("otp-input").value;
            if (entered == generatedOTP) {
                alert("Verified!");
                location.reload();
            } else {
                alert("Incorrect OTP.");
            }
        }

        function login() { window.location.href = "home.html"; }
    </script>
</body>
</html>
