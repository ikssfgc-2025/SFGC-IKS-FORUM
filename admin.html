<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS - Admin Control Panel</title>
    <style>
        /* ============================================
           GLOBAL DNA - Matching auth.html
           ============================================ */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            font-family: 'Georgia Pro', Georgia, serif;
            /* Same Background as auth.html */
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #fdf5e6;
            display: flex;
            flex-direction: column;
        }

        /* ============================================
           HEADER & NAVIGATION (Consistent with Site)
           ============================================ */
        header {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 1000;
            border-bottom: 2px solid #BF953F;
        }

        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            margin: 10px 0;
            letter-spacing: 2px;
        }

        /* ============================================
           ADMIN CARD - Matching auth.html Style
           ============================================ */
        .portal-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px;
        }

        .admin-container {
            background: rgba(0, 0, 0, 0.85);
            width: 100%;
            max-width: 900px; /* Wider for the Calendar */
            padding: 35px;
            border-radius: 20px;
            border: 2px solid #BF953F;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        h2 { 
            color: #ffd700; 
            text-align: center; 
            font-size: 1.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #BF953F;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        /* ============================================
           CALENDAR AREA
           ============================================ */
        .calendar-box {
            width: 100%;
            background: #000;
            border: 1px solid #BF953F;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.1);
        }

        /* ============================================
           BUTTON DESIGN - Exact Match to auth.html
           ============================================ */
        .admin-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .btn-gold {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 50%, #B38728 100%);
            border: none;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            box-sizing: border-box;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        /* Logout Link */
        .logout-link {
            text-align: center;
            margin-top: 25px;
            display: block;
            color: #ffcc66;
            text-decoration: none;
            font-size: 0.9em;
        }

        .logout-link:hover { color: #ffd700; text-decoration: underline; }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to right, #1F0505, #3B0D0D, #1F0505);
            border-top: 2px solid #BF953F;
        }

        footer p {
            margin: 0;
            font-weight: bold;
            color: #BF953F;
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .admin-actions { grid-template-columns: 1fr; }
            .admin-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SFGC IKS Forum</h1>
    </header>

    <div class="portal-wrapper">
        <div class="admin-container">
            <h2>Admin Access</h2>
            
            <div class="calendar-box">
                <iframe src="https://calendar.google.com/calendar/embed?src=iks.sfgc%40gmail.com&ctz=Asia%2FKolkata" 
                style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
            </div>

            <div class="admin-actions">
                <a href="#" class="btn-gold">Book Event</a>
                <a href="#" class="btn-gold">View Records</a>
            </div>

            <a href="auth.html" class="logout-link">← Secure Logout to Student Portal</a>
        </div>
    </div>

    <footer>
        <p>© All Copyrights Reserved 2026-27<br>SFGC IKS FORUM - ADMIN ACCESS</p>
    </footer>

</body>
</html>
