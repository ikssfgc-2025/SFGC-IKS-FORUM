<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | IKS Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: url('45383.png') no-repeat center center fixed; 
            background-size: cover;
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
        }
        
        #adminGate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        #adminGate::before { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(2, 11, 20, 0.8); z-index: -1; }
        
        .login-box { background: rgba(11, 26, 43, 0.95); padding: 40px; border-radius: 12px; border: 1px solid #00d2ff; text-align: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); width: 320px; }
        .login-box h2 { color: #00d2ff; margin-bottom: 20px; letter-spacing: 2px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #020b14; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 12px; background: #00d2ff; border: none; color: #020b14; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }

        .content { display: none; max-width: 95%; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(2, 11, 20, 0.8); padding: 20px; border-radius: 10px; border: 1px solid rgba(0, 210, 255, 0.3); margin-bottom: 20px; }
        
        .controls-row { display: flex; gap: 15px; margin-bottom: 20px; background: rgba(11, 26, 43, 0.8); padding: 15px; border-radius: 8px; align-items: center; }
        .search-input { padding: 10px; border-radius: 5px; border: 1px solid #333; background: #020b14; color: white; flex-grow: 1; }
        
        .btn-export { padding: 10px 20px; border: none; background: #28a745; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; text-transform: uppercase; }

        .table-wrapper {
            background: rgba(11, 26, 43, 0.9);
            border-radius: 10px;
            border: 1px solid rgba(26, 42, 58, 0.5);
            backdrop-filter: blur(10px);
            overflow-x: auto;
            width: 100%;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1200px; }
        th { background: rgba(2, 11, 20, 0.9); color: #00d2ff; text-transform: uppercase; font-size: 11px; padding: 15px; border-bottom: 2px solid #1a2a3a; white-space: nowrap; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid rgba(26, 42, 58, 0.3); font-size: 13px; white-space: nowrap; color: #ccc; }
        tr:hover { background: rgba(0, 210, 255, 0.1); }
        
        .btn-logout { background: #ff4b2b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Custom Scrollbar */
        .table-wrapper::-webkit-scrollbar { height: 8px; }
        .table-wrapper::-webkit-scrollbar-track { background: #020b14; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #00d2ff; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="adminGate">
        <div class="login-box">
            <h2>IKS ADMIN GATE</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="checkGate()">UNSEAL DASHBOARD</button>
        </div>
    </div>

    <div class="content" id="adminContent">
        <div class="header">
            <h1 style="margin:0; font-size: 22px; color: #00d2ff;">IKS PORTAL // DATABASE ADMIN</h1>
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
        </div>

        <div class="controls-row">
            <input type="text" id="searchInput" class="search-input" placeholder="Search (Name, College, Aadhar)..." onkeyup="searchTable()">
            <button class="btn-export" onclick="exportToCSV()">EXPORT CSV</button>
            <div style="margin-left:auto; color:#00d2ff; font-weight:bold;">Total Entries: <span id="totalCount">0</span></div>
        </div>

        <div class="table-wrapper">
            <table id="adminTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Gender</th>
                        <th>College</th>
                        <th>Aadhar</th>
                        <th>Phone</th>
                        <th>Parent Phone</th>
                        <th>Email</th>
                        <th>Course</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="10" style="text-align:center; padding: 50px;">Initializing secure connection...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAkoWeMnqL9sN-Ghxcwq1wye8iml06qBEg",
        authDomain: "iks-portal.firebaseapp.com",
        projectId: "iks-portal",
        storageBucket: "iks-portal.firebasestorage.app",
        messagingSenderId: "850853533746",
        appId: "1:850853533746:web:a224e31b38d784f39a042b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allUsers = [];

    // --- SESSION CHECK ---
    if (sessionStorage.getItem("iks_is_logged_in") === "true") {
        document.getElementById("adminGate").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        loadData(); 
    }

    // --- AUTHENTICATION ---
    window.checkGate = function() {
        const u = document.getElementById("adminUser").value;
        const p = document.getElementById("adminPass").value;
        if (u === "IKS_SFGC" && p === "IKS@$FGC.2026") {
            sessionStorage.setItem("iks_is_logged_in", "true");
            document.getElementById("adminGate").style.display = "none";
            document.getElementById("adminContent").style.display = "block";
            loadData();
        } else { alert("Access Denied. Incorrect Credentials."); }
    };

    window.logout = function() {
        if(confirm("Are you sure you want to logout?")) {
            sessionStorage.removeItem("iks_is_logged_in");
            location.reload();
        }
    };

    // --- FIREBASE DATA ---
    window.loadData = async function() {
        try {
            const querySnapshot = await getDocs(collection(db, "users"));
            allUsers = [];
            querySnapshot.forEach(doc => {
                allUsers.push({ id: doc.id, ...doc.data() });
            });
            renderTable(allUsers);
        } catch (error) {
            console.error("Firebase Error:", error);
            document.getElementById("userTableBody").innerHTML = `<tr><td colspan="10" style="text-align:center; color:#ff4b2b; padding:20px;">Failed to sync with database.</td></tr>`;
        }
    };

    function renderTable(dataList) {
        const tableBody = document.getElementById("userTableBody");
        tableBody.innerHTML = "";
        
        if (dataList.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="10" style="text-align:center; padding: 50px; color:#555;">No records found in the database.</td></tr>`;
            document.getElementById("totalCount").innerText = "0";
            return;
        }

        dataList.forEach((user, index) => {
            const row = `<tr>
                <td>${index + 1}</td>
                <td style="color:white; font-weight:bold;">${user.name || '—'}</td>
                <td>${user.username || '—'}</td>
                <td>${user.gender || '—'}</td>
                <td>${user.college || '—'}</td>
                <td>${user.aadhar || '—'}</td>
                <td style="color:#00d2ff;">${user.phone || '—'}</td>
                <td>${user.parent || '—'}</td>
                <td>${user.email || '—'}</td>
                <td>${user.course || 'General'}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
        document.getElementById("totalCount").innerText = dataList.length;
    }

    // --- UI TOOLS ---
    window.searchTable = function() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        const filtered = allUsers.filter(u => 
            Object.values(u).some(val => val?.toString().toLowerCase().includes(term))
        );
        renderTable(filtered);
    };

    window.exportToCSV = function() {
        if (allUsers.length === 0) return;
        const headers = ["Name", "Username", "Gender", "College", "Aadhar", "Phone", "Parent Phone", "Email", "Course"];
        const rows = allUsers.map(u => [
            `"${u.name || ''}"`, `"${u.username || ''}"`, `"${u.gender || ''}"`, 
            `"${u.college || ''}"`, `"${u.aadhar || ''}"`, `"${u.phone || ''}"`, 
            `"${u.parent || ''}"`, `"${u.email || ''}"`, `"${u.course || 'General'}"`
        ]);
        let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const link = document.createElement("a");
        link.href = encodeURI(csvContent);
        link.download = "IKS_Full_Database_Export.csv";
        link.click();
    };
</script>
</body>
</html>
