<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS - Admin Portal</title>
    <style>
        /* ============================================
           GLOBAL DNA & BACKGROUND
           ============================================ */
        html, body { margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        body {
            font-family: 'Georgia Pro', Georgia, serif;
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #fdf5e6;
            display: flex;
            flex-direction: column;
        }

        /* ============================================
           HEADER & NAVIGATION (Consistent with auth.html)
           ============================================ */
        header {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px; text-align: center;
            position: relative; z-index: 1000;
            border-bottom: 2px solid #BF953F;
        }

        h1 { color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); margin: 10px 0; }

        nav ul {
            list-style: none; padding: 0; display: flex;
            justify-content: center; flex-wrap: wrap; gap: 20px;
        }

        nav a {
            color: #ffcc66; text-decoration: none; font-weight: bold;
            font-size: 1.1em; transition: 0.3s;
        }

        nav a:hover { color: #fff; text-shadow: 0 0 10px #ffd700; }

        .hamburger {
            display: none; flex-direction: column; cursor: pointer;
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
        }

        .hamburger div { width: 25px; height: 3px; background-color: #ffd700; margin: 3px 0; }

        /* ============================================
           ADMIN CONTAINER
           ============================================ */
        .portal-wrapper {
            flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 15px;
        }

        .admin-container {
            background: rgba(0, 0, 0, 0.85);
            width: 100%; max-width: 900px;
            padding: 35px; border-radius: 20px;
            border: 2px solid #BF953F;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        h2 { color: #ffd700; text-align: center; text-transform: uppercase; border-bottom: 1px solid #BF953F; padding-bottom: 15px; margin-bottom: 25px; }

        .calendar-box {
            width: 100%; background: #000; border: 1px solid #BF953F;
            border-radius: 10px; overflow: hidden; margin-bottom: 30px;
        }

        /* ============================================
           BUTTON DESIGN (Exact Match to auth.html)
           ============================================ */
        .admin-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .btn-gold {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 50%, #B38728 100%);
            border: none; color: #000; font-weight: 900; cursor: pointer;
            border-radius: 8px; text-transform: uppercase; transition: 0.3s;
            text-decoration: none; text-align: center; display: inline-block; box-sizing: border-box;
        }

        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4); }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            padding: 30px; text-align: center;
            background: linear-gradient(to right, #1F0505, #3B0D0D, #1F0505);
            border-top: 2px solid #BF953F;
        }

        footer p {
            margin: 0; font-weight: bold;
            background: linear-gradient(to bottom, #BF953F, #FCF6BA, #B38728);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            nav ul {
                display: none; flex-direction: column; position: absolute;
                top: 75px; right: 10px; width: 240px; background: rgba(0,0,0,0.95);
                border: 1px solid #BF953F; border-radius: 10px; padding: 15px 0;
            }
            nav ul.active { display: flex; }
            nav ul li { margin: 10px 0; width: 100%; text-align: center; }
            .admin-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hamburger" onclick="toggleMenu()"><div></div><div></div><div></div></div>
        <h1>SFGC IKS Forum</h1>
        <nav>
            <ul id="nav-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="occasion.html">Occasions</a></li>
                <li><a href="proceedings-journal.html">Proceedings & Journal</a></li>
                <li><a href="committee.html">Committee</a></li>
                <li><a href="about us.html">About Us</a></li>
                <li><a href="auth.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="portal-wrapper">
        <div class="admin-container">
            <h2>Admin Control Center</h2>
            
            <div class="calendar-box">
                <iframe src="https://calendar.google.com/calendar/embed?src=iks.sfgc%40gmail.com&ctz=Asia%2FKolkata" 
                style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
            </div>

            <div class="admin-actions">
                <a href="#" class="btn-gold">Upload Prospectus</a>
                <a href="#" class="btn-gold">Book Event</a>
                <a href="https://docs.google.com/spreadsheets/d/1r6NL7TxQC6kKEB0d-Am83rNvMC6Yax9AY9waGzmUHLc/edit" target="_blank" class="btn-gold">Database</a>
            </div>
        </div>
    </div>

    <footer><p>© All Copyrights Reserved 2026-27<br>SFGC IKS FORUM - SECURE ADMIN ACCESS</p></footer>

    <script>
        function toggleMenu() { document.getElementById('nav-menu').classList.toggle('active'); }
    </script>
</body>
</html>
