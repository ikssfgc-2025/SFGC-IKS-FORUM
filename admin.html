<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFGC IKS - Secure Admin Portal</title>
    <style>
        /* ============================================
           GLOBAL STYLES & THEME
           ============================================ */
        html, body { margin: 0; padding: 0; min-height: 100vh; font-family: 'Georgia Pro', serif; overflow-x: hidden; }
        body {
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            color: #fdf5e6;
        }

        /* ============================================
           LOGIN GATE STYLES
           ============================================ */
        #login-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }

        .login-box {
            background: rgba(20, 20, 20, 0.8);
            padding: 40px; border-radius: 20px;
            border: 2px solid #BF953F; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 0 30px rgba(191, 149, 63, 0.3);
        }

        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(0,0,0,0.5); border: 1px solid #BF953F;
            color: #fff; border-radius: 5px; box-sizing: border-box;
        }

        /* ============================================
           ADMIN PORTAL STYLES
           ============================================ */
        header {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px; text-align: center;
            border-bottom: 2px solid #BF953F;
            position: relative;
        }

        h1 { color: #ffd700; margin: 10px 0; text-shadow: 0 0 10px #000; }

        .btn-logout {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            padding: 8px 15px; background: #ff4d4d; color: white; border: none;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.8em;
        }

        .portal-wrapper { display: none; padding: 40px 15px; flex-direction: column; align-items: center; }

        .admin-container {
            background: rgba(0, 0, 0, 0.85);
            width: 100%; max-width: 1000px;
            padding: 35px; border-radius: 20px;
            border: 2px solid #BF953F;
            backdrop-filter: blur(10px);
        }

        /* CENTERED BUTTON GRID */
        .action-grid {
            margin: 30px auto; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            max-width: 600px; /* Constrains width to keep buttons same size */
        }

        .btn-gold {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 50%, #B38728 100%);
            border: none; color: #000; font-weight: 900; cursor: pointer;
            border-radius: 8px; text-transform: uppercase; transition: 0.3s;
            text-decoration: none; text-align: center; font-size: 0.9em;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px #ffd700; }

        .calendar-box {
            width: 100%; background: #000; border: 1px solid #BF953F;
            border-radius: 10px; overflow: hidden; margin-top: 30px;
        }

        /* MODAL STYLES */
        .dashboard-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 2000; justify-content: center; align-items: center;
        }

        .dashboard-content { width: 90%; max-width: 1000px; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }

        .stat-card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(191, 149, 63, 0.3);
            padding: 20px; border-radius: 10px; text-align: center; color: #ffd700;
        }

        .table-wrapper { background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px solid rgba(191, 149, 63, 0.2); overflow-x: auto; }

        .data-table { width: 100%; border-collapse: collapse; color: #fff; text-align: left; min-width: 600px; }

        .data-table th { background: rgba(191, 149, 63, 0.2); padding: 15px; color: #ffd700; border-bottom: 2px solid #BF953F; }

        .data-table td { padding: 15px; border-bottom: 1px solid rgba(191, 149, 63, 0.1); }
    </style>
</head>
<body onload="checkSession()">

    <div id="login-gate">
        <div class="login-box">
            <h2 style="color: #ffd700; margin-bottom: 20px;">SECURE ACCESS</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-gold" onclick="validateLogin()" style="margin-top: 20px;">Unlock Portal</button>
            <p id="error-msg" style="color: #ff4d4d; font-size: 0.8em; margin-top: 15px; display: none;">Invalid Credentials. Access Denied.</p>
        </div>
    </div>

    <header>
        <h1>SFGC IKS Forum - Admin Portal</h1>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </header>

    <div class="portal-wrapper" id="main-portal">
        <div class="admin-container">
            <h2 style="color: #ffd700; text-align: center;">Control Center</h2>
            
            <div class="action-grid">
                <button class="btn-gold" onclick="openDashboard()">Upload Prospectus</button>
                <a href="https://docs.google.com/spreadsheets/d/1r6NL7TxQC6kKEB0d-Am83rNvMC6Yax9AY9waGzmUHLc/edit" target="_blank" class="btn-gold">View Sheet</a>
            </div>

            <div class="calendar-box">
                <iframe src="https://calendar.google.com/calendar/embed?src=iks.sfgc%40gmail.com&ctz=Asia%2FKolkata" 
                style="border: 0" width="100%" height="500" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>
    </div>

    <div id="uploadDashboardModal" class="dashboard-overlay">
        <div class="dashboard-content admin-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #ffd700; margin:0;">IKS DATABASE RECORDS</h2>
                <span onclick="closeDashboard()" style="color:#ffd700; font-size:30px; cursor:pointer;">&times;</span>
            </div>

            <div class="stats-row">
                <div class="stat-card">📑<br><small>Total Files</small><div id="stat-total">0</div></div>
                <div class="stat-card">✅<br><small>Verified</small><div>01</div></div>
                <div class="stat-card">⏳<br><small>Recent</small><div>New</div></div>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>FILE NAME</th>
                            <th>UPLOAD DATE</th>
                            <th>STATUS</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="db-list">
                        <tr><td colspan="5" style="text-align:center;">Syncing with IKS Database...</td></tr>
                    </tbody>
                </table>
            </div>
            <button class="btn-gold" style="margin-top:20px; width:auto; padding:10px 20px;" onclick="loadData()">REFRESH DATA</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwL4YjeC8bwt4UL4GqlZT1B6FYmym9YyoaPlArLRajlRFQqyyOj7OeRBmv_RsPLj2O2Vg/exec";

        // CHECK IF ALREADY LOGGED IN
        function checkSession() {
            if (localStorage.getItem("admin_session") === "active") {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-portal').style.display = 'flex';
            }
        }

        // LOGIN LOGIC
        function validateLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            if (user === "IKS_SFGC_ADMIN01" && pass === "IKS@$FGC.2026") {
                localStorage.setItem("admin_session", "active"); // Set session
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-portal').style.display = 'flex';
            } else {
                error.style.display = 'block';
                document.getElementById('username').value = "";
                document.getElementById('password').value = "";
            }
        }

        // LOGOUT LOGIC
        function logout() {
            if(confirm("Are you sure you want to Logout?")) {
                localStorage.removeItem("admin_session"); // Clear session
                location.reload(); // Refresh to show login gate
            }
        }

        // DATABASE MODAL LOGIC
        function openDashboard() {
            document.getElementById('uploadDashboardModal').style.display = 'flex';
            loadData();
        }

        function closeDashboard() { document.getElementById('uploadDashboardModal').style.display = 'none'; }

        async function loadData() {
            const listBody = document.getElementById('db-list');
            listBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Fetching Records...</td></tr>';
            try {
                const response = await fetch(SCRIPT_URL + "?action=read");
                const data = await response.json();
                listBody.innerHTML = "";
                document.getElementById('stat-total').innerText = data.length;
                data.forEach((item, index) => {
                    listBody.innerHTML += `<tr>
                        <td>${index + 1}</td>
                        <td>${item.fileName}</td>
                        <td>${item.uploadDate}</td>
                        <td style="color:#00ff00;">LIVE</td>
                        <td><button onclick="removeEntry('${item.fileName}', this)" style="background:#ff4d4d; color:white; border:none; border-radius:4px; cursor:pointer; padding:5px 10px; font-weight:bold;">REMOVE</button></td>
                    </tr>`;
                });
            } catch (e) {
                listBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#ff4d4d;">Database Offline.</td></tr>';
            }
        }

        async function removeEntry(name, btn) {
            if(confirm("Confirm: Delete " + name + " from IKS Database?")) {
                btn.innerText = "Deleting...";
                btn.disabled = true;
                await fetch(SCRIPT_URL + "?action=delete&name=" + encodeURIComponent(name), { method: 'POST' });
                loadData();
            }
        }
    </script>
</body>
</html>
