<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | IKS Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: url('45383.png') no-repeat center center fixed; 
            background-size: cover;
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
        }
        
        /* THE GATE (Login Screen) */
        #adminGate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('45383.png') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        #adminGate::before { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(2, 11, 20, 0.8); z-index: -1; }
        
        .login-box { background: rgba(11, 26, 43, 0.95); padding: 40px; border-radius: 12px; border: 1px solid #00d2ff; text-align: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); width: 320px; }
        .login-box h2 { color: #00d2ff; margin-bottom: 20px; letter-spacing: 2px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #020b14; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 12px; background: #00d2ff; border: none; color: #020b14; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }

        /* HEADER & DASHBOARD */
        .content { display: none; max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(2, 11, 20, 0.8); padding: 20px; border-radius: 10px; border: 1px solid rgba(0, 210, 255, 0.3); margin-bottom: 20px; }
        
        .filters { display: flex; gap: 15px; margin-bottom: 20px; background: rgba(11, 26, 43, 0.8); padding: 15px; border-radius: 8px; align-items: center; }
        .search-input { padding: 10px; border-radius: 5px; border: 1px solid #333; background: #020b14; color: white; flex-grow: 1; }
        
        .tab-btn { padding: 10px 20px; border: 1px solid #00d2ff; background: transparent; color: #00d2ff; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: #00d2ff; color: #020b14; }

        /* TABLE STYLING */
        .table-container { background: rgba(11, 26, 43, 0.9); border-radius: 10px; border: 1px solid rgba(26, 42, 58, 0.5); overflow: hidden; backdrop-filter: blur(10px); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(2, 11, 20, 0.9); color: #00d2ff; text-transform: uppercase; font-size: 11px; padding: 15px; border-bottom: 2px solid #1a2a3a; }
        td { padding: 15px; border-bottom: 1px solid rgba(26, 42, 58, 0.3); font-size: 14px; }
        tr:hover { background: rgba(0, 210, 255, 0.1); }
        
        .tag-event { background: #003a4a; color: #00d2ff; padding: 4px 10px; border-radius: 20px; font-size: 10px; border: 1px solid #00d2ff; }
        .btn-delete { background: #ff4b2b; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-logout { background: #ff4b2b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="adminGate">
        <div class="login-box">
            <h2>IKS ADMIN GATE</h2>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button onclick="checkGate()">UNSEAL DASHBOARD</button>
        </div>
    </div>

    <div class="content" id="adminContent">
        <div class="header">
            <h1 style="margin:0; font-size: 22px; color: #00d2ff;">IKS PORTAL // ADMIN</h1>
            <button class="btn-logout" onclick="location.reload()">LOGOUT</button>
        </div>

        <div class="filters">
            <button class="tab-btn active" id="btnAll" onclick="filterData('all')">ALL</button>
            <button class="tab-btn" id="btnEvent" onclick="filterData('event')">EVENTS ONLY</button>
            <button class="tab-btn" id="btnCourse" onclick="filterData('course')">COURSES ONLY</button>
            <input type="text" id="searchInput" class="search-input" placeholder="Search by Name or College..." onkeyup="searchTable()">
            <div style="margin-left:auto; color:#00d2ff; font-weight:bold;">Count: <span id="totalCount">0</span></div>
        </div>

        <div class="table-container">
            <table id="adminTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>College</th>
                        <th>Phone</th>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAkoWeMnqL9sN-Ghxcwq1wye8iml06qBEg",
        authDomain: "iks-portal.firebaseapp.com",
        projectId: "iks-portal",
        storageBucket: "iks-portal.firebasestorage.app",
        messagingSenderId: "850853533746",
        appId: "1:850853533746:web:a224e31b38d784f39a042b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allUsers = [];

    window.checkGate = function() {
        if (document.getElementById("adminUser").value === "SFGC_IKS" && 
            document.getElementById("adminPass").value === "IKS@$FGC.2026") {
            document.getElementById("adminGate").style.display = "none";
            document.getElementById("adminContent").style.display = "block";
            loadData();
        } else { alert("Access Denied."); }
    };

    window.loadData = async function() {
        const querySnapshot = await getDocs(collection(db, "users"));
        allUsers = [];
        querySnapshot.forEach(doc => {
            allUsers.push({ id: doc.id, ...doc.data() });
        });
        renderTable(allUsers);
    };

    function renderTable(dataList) {
        const tableBody = document.getElementById("userTableBody");
        tableBody.innerHTML = "";
        dataList.forEach((user, index) => {
            // Logic to determine if it's an event or course (adjust based on your data fields)
            const typeLabel = user.isEvent ? "EVENT" : "COURSE"; 
            
            const row = `<tr>
                <td>${index + 1}</td>
                <td style="color:white; font-weight:bold;">${user.name || 'N/A'}</td>
                <td>${user.college || 'N/A'}</td>
                <td style="color:#00d2ff;">${user.phone || 'N/A'}</td>
                <td><span class="tag-event">${typeLabel}</span></td>
                <td>${user.course || 'General'}</td>
                <td><button class="btn-delete" onclick="deleteEntry('${user.id}')">Delete</button></td>
            </tr>`;
            tableBody.innerHTML += row;
        });
        document.getElementById("totalCount").innerText = dataList.length;
    }

    window.filterData = function(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(mode === 'all') {
            renderTable(allUsers);
            document.getElementById('btnAll').classList.add('active');
        } else if(mode === 'event') {
            renderTable(allUsers.filter(u => u.isEvent === true));
            document.getElementById('btnEvent').classList.add('active');
        } else {
            renderTable(allUsers.filter(u => !u.isEvent));
            document.getElementById('btnCourse').classList.add('active');
        }
    };

    window.searchTable = function() {
        const term = document.getElementById("searchInput").value.toLowerCase();
        const filtered = allUsers.filter(u => 
            u.name?.toLowerCase().includes(term) || 
            u.college?.toLowerCase().includes(term)
        );
        renderTable(filtered);
    };

    window.deleteEntry = async function(id) {
        if (confirm("Delete this participant?")) {
            await deleteDoc(doc(db, "users", id));
            loadData();
        }
    };
</script>
</body>
</html>
