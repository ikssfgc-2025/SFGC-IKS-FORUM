<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IKS Admin - Simple Control</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #333; padding: 30px; border-radius: 15px; border: 1px solid #ffd700; width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .upload { background: #ffd700; color: black; }
        .delete { background: #ff4444; color: white; }
        #admin-ui { display: none; }
    </style>
</head>
<body>

    <div id="login-ui" class="box">
        <h2 style="color:#ffd700">Admin Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="upload" onclick="login()">Login</button>
    </div>

    <div id="admin-ui" class="box">
        <h2 style="color:#ffd700">Link Controller</h2>
        <p>Current Status: <span id="status" style="font-weight:bold">Checking...</span></p>
        <input type="text" id="new-link" placeholder="Paste new Google Form link here">
        <button class="upload" onclick="saveLink()">UPLOAD NEW LINK</button>
        <button class="delete" onclick="removeLink()">DELETE EXISTING LINK</button>
        <button onclick="location.reload()" style="background:#555; color:white; margin-top:10px;">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://iks-portal-default-rtdb.firebaseio.com", 
            projectId: "iks-portal",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const linkRef = ref(db, 'currentForm');

        // Simple Login Check
        window.login = function() {
            if(document.getElementById('user').value === "IKS_SFGC_ADMIN01" && 
               document.getElementById('pass').value === "IKS@$FGC") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('admin-ui').style.display = 'block';
                checkLink();
            } else { alert("Wrong credentials"); }
        }

        // 1. SEE IF GOOGLE FORM EXISTS
        function checkLink() {
            onValue(linkRef, (snapshot) => {
                const data = snapshot.val();
                const status = document.getElementById('status');
                if (data) {
                    status.innerText = "Link is LIVE";
                    status.style.color = "#00ff00";
                } else {
                    status.innerText = "No Link (Deleted)";
                    status.style.color = "#ff4444";
                }
            });
        }

        // 2. UPLOAD NEW LINK
        window.saveLink = function() {
            const url = document.getElementById('new-link').value;
            if(url.includes("http")) {
                set(linkRef, url).then(() => {
                    alert("Link Updated!");
                    document.getElementById('new-link').value = "";
                });
            } else { alert("Paste a valid link"); }
        }

        // 3. DELETE LINK
        window.removeLink = function() {
            if(confirm("Delete the current Google Form?")) {
                remove(linkRef).then(() => alert("Link Deleted!"));
            }
        }
    </script>
</body>
</html>
