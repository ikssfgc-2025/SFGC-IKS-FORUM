<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 20px;
            background: #ecf0f1;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
            text-align: center;
        }

        button {
            padding: 10px;
            border: none;
            background: red;
            color: white;
            cursor: pointer;
        }
    </style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>IKS Portal</h2>

    <a href="home.html">Participation</a>
    <a href="proceedings.html">Journal</a>
    <a href="committee.html">Committee</a>
    <a href="about.html">About Us</a>

    <a href="#" onclick="logout()">Logout</a>
</div>

<!-- Main Content -->
<div class="main">

    <h1>Welcome To Forum</h1>
    <p id="userEmail"></p>
    <p>This is your dashboard.</p>

    <!-- Cards -->
    <div class="card">
        <h3>Participation</h3>
        <p>View your activities</p>
        <a href="home.html">Open</a>
    </div>

    <div class="card">
        <h3>Journal</h3>
        <p>Read & submit papers</p>
        <a href="proceedings.html">Open</a>
    </div>

    <div class="card">
        <h3>Committee</h3>
        <p>View members</p>
        <a href="committee.html">Open</a>
    </div>

    <div class="card">
        <h3>About Us</h3>
        <p>Know about IKS</p>
        <a href="about.html">Open</a>
    </div>

</div>

<!-- Firebase Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAkoWeMnqL9sN-Ghxcwq1wye8iml06qBEg",
  authDomain: "iks-portal.firebaseapp.com",
  projectId: "iks-portal",
  storageBucket: "iks-portal.firebasestorage.app",
  messagingSenderId: "850853533746",
  appId: "1:850853533746:web:a224e31b38d784f39a042b"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Check login
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    } else {
        document.getElementById("userEmail").innerText = "Logged in as: " + user.email;
    }
});

// Logout
window.logout = function() {
    signOut(auth).then(() => {
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
